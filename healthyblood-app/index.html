<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#062818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HealthyBlood">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:wght@500;600;700;800&display=swap" rel="stylesheet">
<title>HealthyBlood — Your Wellness Companion</title>
<style>
  :root {
    --bg: #062818;
    --bg-deep: #04190f;
    --bg-card: #0c3422;
    --bg-card-hover: #11402b;
    --border: #16553a;
    --border-soft: #0e3a26;
    --accent: #4ade80;
    --accent-bright: #6ee7a3;
    --accent-deep: #16a34a;
    --text: #f0fdf4;
    --text-soft: #a8d5b9;
    --text-muted: #6a9080;
    --danger: #f87171;
    --warning: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  a { color: var(--accent); text-decoration: none; }

  /* === Layout === */
  .app {
    display: flex;
    flex-direction: column;
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    background: var(--bg);
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  /* === Header === */
  .header {
    padding: 24px 22px 20px;
    padding-top: calc(24px + env(safe-area-inset-top));
    background: linear-gradient(180deg, #08311e 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border-soft);
  }
  .wordmark {
    font-family: "Fraunces", Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }
  .wordmark .accent { color: var(--accent); font-style: italic; }
  .header-greeting {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 8px;
    font-weight: 500;
  }
  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }

  /* === Main scroll === */
  .main {
    flex: 1;
    overflow-y: auto;
    padding-bottom: calc(96px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }

  /* === Bottom Nav === */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(6, 40, 24, 0.96);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--border-soft);
    display: flex;
    padding: 10px 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 20;
  }
  .nav button {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 8px 4px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    transition: color 0.2s, transform 0.1s;
    position: relative;
  }
  .nav button.active { color: var(--accent); }
  .nav button.active::before {
    content: "";
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 3px;
    background: var(--accent);
    border-radius: 0 0 3px 3px;
  }
  .nav-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-icon svg { width: 22px; height: 22px; stroke-width: 2; }

  /* === Section === */
  .section { padding: 22px 20px 30px; }

  /* === Cards === */
  .card {
    background: linear-gradient(180deg, var(--bg-card) 0%, #0a2e1d 100%);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .card-eyebrow {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* === Hero progress card === */
  .hero-card {
    background:
      radial-gradient(circle at top right, rgba(74, 222, 128, 0.12), transparent 60%),
      linear-gradient(180deg, var(--bg-card) 0%, #0a2e1d 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 26px 22px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .hero-progress-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 22px;
  }
  .progress-ring {
    position: relative;
    width: 86px;
    height: 86px;
    flex-shrink: 0;
  }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring .ring-bg { stroke: rgba(74, 222, 128, 0.12); }
  .progress-ring .ring-fill {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    filter: drop-shadow(0 0 6px rgba(74, 222, 128, 0.4));
  }
  .progress-ring .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .progress-ring .ring-text small {
    font-family: "Inter", sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .hero-stats {
    flex: 1;
  }
  .hero-stats .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .hero-stats h2 {
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.4px;
  }
  .hero-stats p {
    font-size: 12px;
    color: var(--text-soft);
    line-height: 1.4;
  }
  .week-strip {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    padding-top: 18px;
    margin-top: 4px;
    border-top: 1px solid var(--border-soft);
  }
  .week-day {
    flex: 1;
    text-align: center;
  }
  .week-day .day-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .week-day .day-cell {
    width: 100%;
    aspect-ratio: 1;
    max-width: 42px;
    margin: 0 auto;
    border-radius: 12px;
    background: rgba(255,255,255,0.025);
    border: 1.5px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-soft);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .week-day .day-cell.partial {
    background: rgba(74, 222, 128, 0.1);
    border-color: rgba(74, 222, 128, 0.35);
    color: var(--accent);
  }
  .week-day .day-cell.done {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-color: var(--accent);
    color: var(--bg);
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.25);
  }
  .week-day.today .day-label {
    color: var(--accent);
  }
  .week-day .day-cell.today {
    border-color: var(--accent);
    border-width: 2px;
    box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.15);
  }
  .week-day .day-cell .check-mark {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    background: var(--bg);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--accent);
  }
  .week-day .day-cell.done .check-mark {
    display: none;
  }

  /* === Habit Checklist === */
  .habit-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .habit-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 4px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .habit-row:last-child { border-bottom: none; }
  .habit-row:active { background: rgba(74, 222, 128, 0.04); }
  .habit-checkbox {
    width: 26px;
    height: 26px;
    border-radius: 9px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    background: rgba(0,0,0,0.2);
  }
  .habit-checkbox svg {
    width: 16px;
    height: 16px;
    stroke: var(--bg);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .habit-row.checked .habit-checkbox {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
  }
  .habit-row.checked .habit-checkbox svg { opacity: 1; transform: scale(1); }
  .habit-info { flex: 1; min-width: 0; }
  .habit-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    transition: color 0.2s;
  }
  .habit-row.checked .habit-title {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: rgba(168, 213, 185, 0.4);
  }
  .habit-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .habit-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: rgba(74, 222, 128, 0.08);
    color: var(--accent);
    font-size: 18px;
  }

  /* === Buttons === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 15px 24px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: var(--bg);
    font-weight: 700;
    font-size: 15px;
    border-radius: 14px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.25);
    letter-spacing: -0.1px;
  }
  .btn:active { transform: scale(0.97); }
  .btn.full { width: 100%; }
  .btn.ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-soft);
    box-shadow: none;
  }
  .btn.danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.2);
  }
  .btn.small { padding: 11px 16px; font-size: 13px; border-radius: 11px; }

  /* === Sub-tabs (for Health section) === */
  .subtabs {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    margin: -4px 0 18px;
  }
  .subtab {
    flex: 1;
    background: transparent;
    border: 1.5px solid var(--border-soft);
    color: var(--text-soft);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .subtab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.2);
  }
  .subtab .emoji { font-size: 16px; }

  /* === Lab Results === */
  .lab-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .lab-summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 16px;
  }
  .lab-summary-card .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .lab-summary-card .value {
    font-family: "Fraunces", serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .lab-summary-card .unit {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-left: 4px;
  }
  .lab-summary-card .change {
    font-size: 11px;
    margin-top: 4px;
    font-weight: 600;
  }
  .lab-summary-card .change.up { color: #f87171; }
  .lab-summary-card .change.down { color: var(--accent); }
  .lab-summary-card .change.flat { color: var(--text-muted); }
  .lab-empty {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-soft);
  }
  .lab-chart-card { padding: 22px 18px 16px; }
  .lab-chart-svg { width: 100%; height: 180px; display: block; }
  .lab-chart-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
    justify-content: center;
  }
  .lab-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 600;
  }
  .lab-legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .lab-history-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .lab-history-date {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
  }
  .lab-history-vals {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .lab-history-delete {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .lab-form {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
  }
  .lab-form label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .lab-form input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border-soft);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .lab-form input:focus { border-color: var(--accent); }
  .lab-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .lab-form-grid .field { margin-bottom: 0; }
  .lab-form-grid input { margin-bottom: 0; }
  .lab-form .field { margin-bottom: 14px; }
  .cora-advice-btn {
    background:
      radial-gradient(circle at top right, rgba(74, 222, 128, 0.18), transparent 60%),
      var(--bg-card) !important;
    border: 1px solid rgba(74, 222, 128, 0.4) !important;
    color: var(--accent-bright) !important;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: 600 !important;
  }
  .cora-advice-btn:hover {
    background:
      radial-gradient(circle at top right, rgba(74, 222, 128, 0.25), transparent 60%),
      var(--bg-card) !important;
    border-color: rgba(74, 222, 128, 0.7) !important;
  }
  .cora-advice-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent-bright), var(--accent-deep));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
  }

  /* === Recipe categories === */
  .recipe-categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    margin-bottom: 14px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .recipe-categories::-webkit-scrollbar { display: none; }
  .recipe-cat-pill {
    flex-shrink: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    color: var(--text-muted);
    padding: 9px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .recipe-cat-pill.active {
    background: linear-gradient(135deg, var(--accent-bright), var(--accent-deep));
    border-color: var(--accent);
    color: var(--bg);
  }
  .recipe-cat-count {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* === Recipes === */
  .recipe-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .recipe-card:active { transform: scale(0.99); background: var(--bg-card-hover); }
  .recipe-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
  }
  .recipe-emoji {
    font-size: 36px;
    line-height: 1;
    flex-shrink: 0;
  }
  .recipe-title {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .recipe-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .recipe-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .recipe-summary {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
  }
  /* Locked recipe cards */
  .recipe-card.locked {
    opacity: 0.45;
    pointer-events: none;
    filter: grayscale(0.3);
  }
  .recipe-card.locked .recipe-summary { display: none; }
  .lock-badge {
    font-size: 16px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  /* Recipe gate CTA */
  .recipe-gate {
    text-align: center;
    padding: 24px 16px;
    margin: 12px 0;
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(74, 222, 128, 0.02));
    border: 1px solid rgba(74, 222, 128, 0.2);
    border-radius: 18px;
  }
  .recipe-gate-icon { font-size: 32px; margin-bottom: 8px; }
  .recipe-gate-count {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .recipe-gate p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .recipe-detail {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .recipe-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 16px;
    cursor: pointer;
    background: transparent;
    border: none;
  }
  .recipe-detail h3 {
    font-family: "Fraunces", serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.4px;
  }
  .recipe-detail .recipe-meta { margin-bottom: 16px; }
  .recipe-section-title {
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin: 18px 0 10px;
  }
  .recipe-detail ul, .recipe-detail ol {
    padding-left: 20px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
  }
  .recipe-detail li { margin-bottom: 6px; }
  .recipe-benefit {
    background: rgba(74, 222, 128, 0.06);
    border: 1px solid rgba(74, 222, 128, 0.2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
  }
  .recipe-benefit strong { color: var(--accent); }

  /* === Cora Suggests === */
  .cora-suggests {
    position: relative;
    background:
      radial-gradient(circle at top right, rgba(74, 222, 128, 0.14), transparent 65%),
      var(--bg-card);
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 22px;
    padding: 22px 22px 18px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .cora-suggests::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.7;
  }
  .cora-suggests-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .cora-suggests-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent-bright), var(--accent-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.35);
  }
  .cora-suggests-eyebrow {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }
  .cora-suggests-message {
    font-size: 15px;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .cora-suggests-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .cora-suggests-cta {
    flex: 1;
    background: linear-gradient(135deg, var(--accent-bright), var(--accent-deep));
    color: var(--bg);
    border: none;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.25);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cora-suggests-cta:active { transform: translateY(1px); }
  .cora-suggests-dismiss {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-soft);
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .cora-suggests-dismiss:hover { color: var(--text); border-color: var(--text-muted); }

  /* === Reminder settings === */
  .reminder-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .reminder-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .reminder-row:last-child { border-bottom: none; }
  .reminder-icon {
    font-size: 22px;
    width: 32px;
    text-align: center;
    flex-shrink: 0;
  }
  .reminder-info {
    flex: 1;
    min-width: 0;
  }
  .reminder-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .reminder-time {
    background: var(--bg);
    border: 1.5px solid var(--border-soft);
    border-radius: 10px;
    padding: 5px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color-scheme: dark;
  }
  /* Toggle switch */
  .toggle {
    position: relative;
    width: 46px;
    height: 26px;
    background: var(--bg);
    border: 1.5px solid var(--border-soft);
    border-radius: 26px;
    cursor: pointer;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .toggle.on {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-color: var(--accent);
  }
  .toggle.on::after {
    transform: translateX(20px);
    background: var(--bg);
  }

  /* === Install banner === */
  .install-banner {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.12), rgba(74, 222, 128, 0.04));
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .install-banner-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .install-banner-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.25);
  }
  .install-banner-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--bg);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .install-banner h3 {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .install-banner-sub {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 2px;
  }
  .install-steps {
    margin: 14px 0 8px;
    padding-left: 0;
    list-style: none;
    counter-reset: step;
  }
  .install-steps li {
    counter-increment: step;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding: 8px 0 8px 36px;
    position: relative;
    border-bottom: 1px solid rgba(74, 222, 128, 0.1);
  }
  .install-steps li:last-child { border-bottom: none; }
  .install-steps li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 8px;
    width: 24px;
    height: 24px;
    background: rgba(74, 222, 128, 0.15);
    color: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 13px;
    font-weight: 700;
  }
  .install-steps .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    margin: 0 4px;
    vertical-align: middle;
    font-size: 13px;
  }
  .install-banner-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .install-banner-dismiss {
    background: transparent;
    border: 1px solid var(--border-soft);
    color: var(--text-muted);
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .install-banner-cta {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    flex: 1;
    cursor: pointer;
  }

  /* === Did You Know? card === */
  .fact-card {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.06), rgba(110, 231, 163, 0.02));
    border: 1px solid var(--border-soft);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 14px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .fact-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .fact-content { flex: 1; min-width: 0; }
  .fact-eyebrow {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 4px;
  }
  .fact-title {
    font-family: "Fraunces", serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .fact-text {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
  }

  /* === Milestone toast === */
  .milestone-toast {
    position: fixed;
    top: calc(20px + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    padding: 16px 24px;
    border-radius: 16px;
    font-weight: 700;
    box-shadow: 0 10px 40px rgba(74, 222, 128, 0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 90%;
    animation: toastIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .milestone-toast .emoji { font-size: 24px; }
  .milestone-toast .toast-text { font-size: 14px; }
  .milestone-toast .toast-text strong { display: block; font-family: "Fraunces", serif; font-size: 16px; }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, -20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* === Tip card === */
  .tip-card {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(74, 222, 128, 0.02));
    border: 1px solid rgba(74, 222, 128, 0.2);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    position: relative;
  }
  .tip-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 18px;
    bottom: 18px;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    border-radius: 0 3px 3px 0;
  }
  .tip-eyebrow {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
  }
  .tip-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    font-weight: 500;
  }

  /* === Chat (Cora) === */
  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px);
    height: calc(100dvh - 200px);
  }
  .cora-header {
    padding: 24px 22px 18px;
    padding-top: calc(24px + env(safe-area-inset-top));
    background: linear-gradient(180deg, #08311e 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .cora-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, var(--accent-bright), var(--accent-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(74, 222, 128, 0.3);
    position: relative;
  }
  .cora-avatar::after {
    content: "";
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: var(--accent-bright);
    border: 2.5px solid var(--bg);
    border-radius: 50%;
  }
  .cora-info { flex: 1; }
  .cora-name {
    font-family: "Fraunces", serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.3px;
  }
  .cora-status {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 3px;
    font-weight: 500;
  }
  .cora-status .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--accent);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 100px;
  }
  .chat-bubble {
    max-width: 82%;
    padding: 13px 17px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    border-bottom-right-radius: 6px;
    font-weight: 500;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.2);
  }
  .chat-bubble.ai {
    align-self: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .chat-bubble.thinking {
    color: var(--text-muted);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-bubble.thinking::before {
    content: "";
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(74, 222, 128, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .chat-input-bar {
    position: fixed;
    bottom: calc(76px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(6, 40, 24, 0.96);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    padding: 14px 18px;
    border-top: 1px solid var(--border-soft);
    display: flex;
    gap: 10px;
    z-index: 15;
  }
  .chat-input-bar input {
    flex: 1;
    background: var(--bg-card);
    border: 1.5px solid var(--border-soft);
    border-radius: 24px;
    padding: 13px 20px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input-bar input:focus { border-color: var(--accent); }
  .chat-send {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    font-size: 20px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.3);
  }
  .chat-empty {
    text-align: center;
    padding: 24px 14px;
  }
  .cora-intro {
    margin: 10px auto 24px;
    max-width: 320px;
  }
  .cora-intro h3 {
    font-family: "Fraunces", serif;
    color: var(--text);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.4px;
  }
  .cora-intro p {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.5;
  }
  .quick-questions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
  }
  .quick-q {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
  }
  .quick-q::after {
    content: "→";
    margin-left: auto;
    color: var(--accent);
    font-weight: 700;
    transition: transform 0.2s;
  }
  .quick-q:hover, .quick-q:active {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateX(2px);
  }
  .quick-q:hover::after { transform: translateX(4px); }

  /* === Subscriptions === */
  .sub-card {
    background: linear-gradient(180deg, var(--bg-card), #0a2e1d);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 14px;
  }
  .sub-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }
  .sub-title {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .sub-meta {
    font-size: 13px;
    color: var(--text-muted);
  }
  .sub-status {
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .sub-status.active {
    background: rgba(74, 222, 128, 0.12);
    color: var(--accent);
    border: 1px solid rgba(74, 222, 128, 0.3);
  }
  .sub-status.paused {
    background: rgba(251, 191, 36, 0.12);
    color: var(--warning);
    border: 1px solid rgba(251, 191, 36, 0.3);
  }
  .sub-status.cancelled {
    background: rgba(239, 68, 68, 0.12);
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .sub-detail {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    font-size: 14px;
    border-top: 1px solid var(--border-soft);
  }
  .sub-detail .key { color: var(--text-muted); font-weight: 500; }
  .sub-detail .val { color: var(--text); font-weight: 600; }
  .sub-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  /* Frequency / quantity adjustment row */
  .sub-adjust {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-top: 1px solid var(--border-soft);
  }
  .sub-adjust .key { color: var(--text-muted); font-weight: 500; font-size: 14px; }
  .sub-adjust select, .sub-adjust .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sub-adjust select {
    background: var(--bg);
    border: 1.5px solid var(--border-soft);
    border-radius: 10px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color-scheme: dark;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid var(--border-soft);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .qty-val {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    min-width: 20px;
    text-align: center;
  }
  /* Retention / cancel flow overlay */
  .cancel-flow {
    background: linear-gradient(180deg, var(--bg-card), #1a0a0a);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 20px;
    padding: 24px;
    margin-top: 12px;
    text-align: center;
  }
  .cancel-flow h3 {
    font-family: "Fraunces", serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .cancel-flow p {

<script>
// =====================================================
// HealthyBlood PWA — main app
// =====================================================
const API = window.location.hostname === "localhost"
  ? "http://localhost:3001/api"
  : "https://veo3-command-center.onrender.com/api";

// === Daily habits library ===
const HABITS = [
  { id: "drops",   icon: "💧", title: "Take HealthyBlood drops",  desc: "2ml under the tongue, hold 30 seconds" },
  { id: "walk",    icon: "🚶", title: "Move for 20 minutes",       desc: "A walk after a meal works wonders" },
  { id: "water",   icon: "🥤", title: "Drink 8 glasses of water",  desc: "Hydration supports heart health" },
  { id: "veggies", icon: "🥗", title: "Eat 1 leafy-green meal",    desc: "Greens fuel cardiovascular wellness" },
  { id: "sleep",   icon: "😴", title: "Sleep 7+ hours tonight",    desc: "Rest is when your body repairs" },
  { id: "noproc",  icon: "🚫", title: "Skip processed & fried",    desc: "Real food, real results" },
];

// === State ===
const state = {
  email: localStorage.getItem("hb_email") || "",
  name: localStorage.getItem("hb_name") || "",
  onboarded: localStorage.getItem("hb_onboarded") === "true",
  tab: "home",
  // Habits stored as { "2026-04-09": { drops: true, walk: true, ... } }
  habits: JSON.parse(localStorage.getItem("hb_habits_v2") || "{}"),
  chat: JSON.parse(localStorage.getItem("hb_chat") || "[]"),
  chatBusy: false,
  subs: null,
  subsLoading: false,
  subsError: null,
  actionBusy: null,
  cancelFlowId: null,
  pauseFlowId: null,
  skipFlowId: null,
  banner: null,
  // Health: lab results [{date:"2026-04-09", ldl:120, hdl:55, total:200, trig:140}, ...]
  labs: JSON.parse(localStorage.getItem("hb_labs") || "[]"),
  healthSubtab: "labs", // "labs" | "recipes"
  recipeCategory: "all", // category filter for recipes
  selectedRecipe: null, // recipe id when viewing detail
  // Reminders: { drops:{enabled,time}, walk:{...}, water:{...}, sleep:{...} }
  reminders: JSON.parse(localStorage.getItem("hb_reminders") || '{"drops":{"enabled":false,"time":"09:00"},"walk":{"enabled":false,"time":"17:00"},"water":{"enabled":false,"time":"12:00"},"sleep":{"enabled":false,"time":"22:00"}}'),
  coraSuggestDismissed: localStorage.getItem("hb_cora_suggest_dismissed_" + new Date().toDateString()) === "true",
};

// === Storage helpers ===
const saveHabits = () => localStorage.setItem("hb_habits_v2", JSON.stringify(state.habits));
const saveChat = () => localStorage.setItem("hb_chat", JSON.stringify(state.chat));
const saveEmail = (e) => { state.email = e; localStorage.setItem("hb_email", e); };
const saveName = (n) => { state.name = n; localStorage.setItem("hb_name", n); };
const completeOnboarding = () => { state.onboarded = true; localStorage.setItem("hb_onboarded", "true"); };
const saveLabs = () => localStorage.setItem("hb_labs", JSON.stringify(state.labs));
const saveReminders = () => localStorage.setItem("hb_reminders", JSON.stringify(state.reminders));

// === Date helpers ===
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const dayKey = (offset) => {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const habitsForDay = (key) => state.habits[key] || {};
const dayCompleted = (key) => {
  const h = habitsForDay(key);
  return HABITS.every(habit => h[habit.id]);
};
const dayHasAny = (key) => {
  const h = habitsForDay(key);
  return HABITS.some(habit => h[habit.id]);
};
const dayPercent = (key) => {
  const h = habitsForDay(key);
  const done = HABITS.filter(habit => h[habit.id]).length;
  return Math.round((done / HABITS.length) * 100);
};
const calcStreak = () => {
  let s = 0;
  for (let i = 0; i < 365; i++) {
    if (dayCompleted(dayKey(-i))) s++;
    else if (i > 0) break;
  }
  return s;
};
const calcTotalDays = () => Object.keys(state.habits).filter(k => dayCompleted(k)).length;

// === Daily tips (rotates every day) ===
const TIPS = [
  "Take HealthyBlood at the same time each day for the smoothest absorption.",
  "Pair your daily dropper with a glass of water and a 20-minute walk.",
  "Consistency matters more than perfection — small daily wins compound.",
  "Try mixing your drops with a splash of orange juice if you prefer the taste.",
  "Hydration helps your body process supplements more efficiently.",
  "A whole-food diet amplifies the benefits of your daily routine.",
  "Most customers feel steadier energy after 4-8 weeks of daily use.",
  "Stress management is just as important as supplementation. Breathe deep.",
  "Quality sleep (7-9 hours) supports your cardiovascular health.",
  "Walking after meals can support healthy cholesterol levels.",
  "Take your dropper with food for the smoothest experience.",
  "Track how you FEEL, not just numbers. Energy and mood matter.",
  "Add 10 deep breaths to your morning routine — your heart will thank you.",
  "Eating slower helps digestion and gives your body time to absorb nutrients.",
  "Magnesium-rich foods (spinach, almonds, avocado) support healthy blood pressure.",
  "Strength training 2x per week supports cardiovascular health long-term.",
  "Olive oil — a heart-healthy fat — pairs beautifully with the olive leaf in your drops.",
  "A handful of berries a day delivers powerful antioxidants for your arteries.",
  "Limit added sugar — it's one of the biggest hidden drivers of cholesterol issues.",
  "Stand up and stretch every hour. Sitting too long affects circulation.",
];
const dayIndex = () => Math.floor(Date.now() / 86400000);
const dailyTip = () => TIPS[dayIndex() % TIPS.length];

// === Did You Know? educational facts (rotates every day) ===
const FACTS = [
  { title: "Red Yeast Rice & Heart Health", text: "Red yeast rice naturally contains monacolin K — a compound studied for its support of healthy cholesterol levels in the body." },
  { title: "The Power of Bergamot", text: "Citrus bergamot is rich in unique flavonoids that researchers have linked to a 15-25% reduction in lipid levels within weeks." },
  { title: "Olive Leaf's Secret", text: "Olive leaves contain oleuropein — a powerful antioxidant that helps your arteries stay flexible and resilient." },
  { title: "Why Black Pepper?", text: "Black pepper extract (piperine) can boost the absorption of other nutrients by up to 2,000%. That's why it's in your formula." },
  { title: "Garlic Through History", text: "Ancient Egyptians, Greeks, and Romans used garlic for heart health long before modern science confirmed its cardiovascular benefits." },
  { title: "Soursop's Surprise", text: "Soursop is loaded with antioxidants and has been used in traditional wellness practices across the Caribbean for generations." },
  { title: "Walking Is Medicine", text: "Just 30 minutes of walking 5 days a week can help support healthy blood pressure and cholesterol levels." },
  { title: "The Mediterranean Way", text: "People who follow a Mediterranean diet — rich in olive oil, fish, and vegetables — have notably better heart health markers." },
  { title: "Hydration Matters", text: "Even mild dehydration can thicken your blood, making it harder for your heart to circulate it efficiently." },
  { title: "Sleep & Your Heart", text: "Adults who consistently get 7+ hours of sleep have measurably better cardiovascular health than those who don't." },
  { title: "Stress & Cholesterol", text: "Chronic stress raises cortisol, which over time can negatively impact cholesterol levels. Daily breathing helps." },
  { title: "Fiber Is Your Friend", text: "Soluble fiber (oats, beans, apples) actively binds to cholesterol in your gut and helps escort it out of the body." },
  { title: "Liquid Drops Advantage", text: "HealthyBlood uses liquid drops for faster, more efficient absorption compared to traditional pills or capsules." },
  { title: "Why Consistency Wins", text: "Cholesterol changes happen gradually. Most people see meaningful shifts after 8-12 weeks of consistent daily support." },
];
const dailyFact = () => FACTS[dayIndex() % FACTS.length];

// === Milestones ===
const MILESTONES = [
  { days: 3,   emoji: "🌱", title: "3-day streak!", subtitle: "Habits are forming." },
  { days: 7,   emoji: "🔥", title: "1 week strong!", subtitle: "You're building momentum." },
  { days: 14,  emoji: "⭐", title: "2 weeks complete!", subtitle: "This is becoming who you are." },
  { days: 30,  emoji: "🏆", title: "30 days!", subtitle: "A full month of dedication." },
  { days: 60,  emoji: "💎", title: "60-day champion!", subtitle: "Real changes are happening." },
  { days: 90,  emoji: "👑", title: "90 days!", subtitle: "You're unstoppable." },
];
function checkMilestone(prevStreak, newStreak) {
  if (newStreak <= prevStreak) return null;
  return MILESTONES.find(m => m.days === newStreak) || null;
}
function showMilestone(m) {
  const toast = document.createElement("div");
  toast.className = "milestone-toast";
  toast.innerHTML = `<span class="emoji">${m.emoji}</span><div class="toast-text"><strong>${esc(m.title)}</strong>${esc(m.subtitle)}</div>`;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translate(-50%, -20px)"; toast.style.transition = "all 0.4s"; }, 4000);
  setTimeout(() => toast.remove(), 4600);
}

// === Platform / install detection ===
function detectPlatform() {
  const ua = navigator.userAgent || "";
  if (/iPhone|iPad|iPod/.test(ua) && !window.MSStream) return "ios";
  if (/Android/.test(ua)) return "android";
  return "desktop";
}
function isStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches
    || window.navigator.standalone === true;
}
function shouldShowInstallBanner() {
  if (isStandalone()) return false;
  if (localStorage.getItem("hb_install_dismissed") === "true") return false;
  const p = detectPlatform();
  return p === "ios" || p === "android";
}
let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});

// === API helpers ===
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || `Error ${r.status}`);
  return data;
}
async function apiGet(path) {
  const r = await fetch(API + path);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || `Error ${r.status}`);
  return data;
}

// === Cora Suggests logic ===
// Analyzes the past 7 days of habits and picks the most-skipped one.
// Returns { habit, message, count } or null if everything is on track.
function getCoraSuggest() {
  if (state.coraSuggestDismissed) return null;
  const today = todayKey();
  const todayHabits = habitsForDay(today);

  // First: if user hasn't taken drops today, that's always priority #1
  if (!todayHabits.drops) {
    const h = new Date().getHours();
    if (h >= 7) {
      return {
        habit: "drops",
        message: h < 12
          ? "Good morning! Don't forget your dropper today — pair it with breakfast for the smoothest absorption."
          : h < 17
            ? "Quick reminder: your daily dropper is still waiting for you. Take it with food."
            : "Your daily dropper today? Even an evening dose with dinner counts toward your streak.",
      };
    }
  }

  // Otherwise: which habit has the user been missing most this week?
  const missCounts = {};
  HABITS.forEach(h => { missCounts[h.id] = 0; });
  for (let i = 0; i < 7; i++) {
    const k = dayKey(-i);
    const dayH = habitsForDay(k);
    HABITS.forEach(h => { if (!dayH[h.id]) missCounts[h.id]++; });
  }

  // Find the habit with the highest miss count (excluding drops, already covered)
  let topHabit = null;
  let topCount = 0;
  HABITS.forEach(h => {
    if (h.id === "drops") return;
    if (missCounts[h.id] > topCount) {
      topCount = missCounts[h.id];
      topHabit = h;
    }
  });

  if (!topHabit || topCount < 3) return null;

  const messages = {
    walk: "I noticed you've skipped your walk a few days this week. Even 10 minutes after a meal helps your heart and your mood.",
    water: "Hydration has been a little behind this week. Try keeping a glass of water in your sightline today.",
    veggies: "Greens have been missing from your week. One leafy salad or sautéed spinach side can change the whole day.",
    sleep: "Your sleep streak could use some love. Try winding down 30 minutes earlier tonight — your heart recovers while you rest.",
    noproc: "I noticed processed foods have crept in this week. One whole-food swap today is a quiet win.",
  };

  return {
    habit: topHabit.id,
    message: messages[topHabit.id] || `Let's get back on track with: ${topHabit.title.toLowerCase()}.`,
  };
}

function dismissCoraSuggest() {
  state.coraSuggestDismissed = true;
  localStorage.setItem("hb_cora_suggest_dismissed_" + new Date().toDateString(), "true");
  render();
}
function openCoraFromSuggest(habit) {
  state.tab = "chat";
  // Pre-fill a conversation starter
  const starters = {
    drops: "I want to remember to take my drops every day. Any tips?",
    walk: "How can I build a daily walking habit?",
    water: "I struggle to drink enough water. Help?",
    veggies: "What are some easy ways to add more vegetables to my day?",
    sleep: "I have trouble winding down at night. Tips?",
    noproc: "How do I cut back on processed foods without feeling deprived?",
  };
  const q = starters[habit] || "Help me get back on track with my habits.";
  render();
  setTimeout(() => sendChat(q), 100);
}
window.dismissCoraSuggest = dismissCoraSuggest;
window.openCoraFromSuggest = openCoraFromSuggest;

function renderCoraSuggests() {
  const s = getCoraSuggest();
  if (!s) return "";
  return `
    <div class="cora-suggests">
      <div class="cora-suggests-header">
        <div class="cora-suggests-avatar">C</div>
        <div class="cora-suggests-eyebrow">Cora suggests</div>
      </div>
      <div class="cora-suggests-message">${esc(s.message)}</div>
      <div class="cora-suggests-actions">
        <button class="cora-suggests-cta" onclick="openCoraFromSuggest('${s.habit}')">Talk to Cora</button>
        <button class="cora-suggests-dismiss" onclick="dismissCoraSuggest()">Got it</button>
      </div>
    </div>
  `;
}

// === Health view (combined Lab Results + Recipes) ===
function viewHealth() {
  return `
    <div class="header">
      <div class="wordmark"><span class="accent">Your</span> Health</div>
      <div class="header-greeting">Track results, eat well</div>
    </div>
    <div class="section">
      <div class="subtabs">
        <button class="subtab ${state.healthSubtab === "labs" ? "active" : ""}" data-subtab="labs">Lab Results</button>
        <button class="subtab ${state.healthSubtab === "recipes" ? "active" : ""}" data-subtab="recipes">Recipes</button>
      </div>
      ${state.healthSubtab === "labs" ? viewLabResults() : (state.selectedRecipe ? viewRecipeDetail() : viewRecipes())}
    </div>
  `;
}

function viewLabResults() {
  const labs = [...state.labs].sort((a, b) => a.date.localeCompare(b.date));
  const latest = labs[labs.length - 1];
  const previous = labs[labs.length - 2];

  const summaryCard = (label, key, unit, lowerBetter = true) => {
    const cur = latest ? latest[key] : null;
    const prev = previous ? previous[key] : null;
    const change = cur != null && prev != null ? cur - prev : null;
    const dir = change == null ? "" : change === 0 ? "same" : (change < 0) === lowerBetter ? "good" : "bad";
    const arrow = change == null ? "—" : change > 0 ? "↑" : change < 0 ? "↓" : "•";
    return `
      <div class="lab-summary-card">
        <div class="lab-summary-label">${label}</div>
        <div class="lab-summary-value">${cur != null ? cur : "—"}<small>${unit}</small></div>
        <div class="lab-summary-change ${dir}">
          ${change != null ? `${arrow} ${Math.abs(change)} from last` : "No previous reading"}
        </div>
      </div>
    `;
  };

  const chartHtml = labs.length >= 2 ? renderLabChart(labs) : "";

  const historyHtml = labs.length === 0
    ? `<div class="lab-empty">

// SVG line chart for LDL & HDL over time
function renderLabChart(labs) {
  const W = 320, H = 180, P = 30;
  const ldls = labs.map(l => l.ldl).filter(v => v != null);
  const hdls = labs.map(l => l.hdl).filter(v => v != null);
  const allVals = [...ldls, ...hdls];
  if (allVals.length === 0) return "";
  const min = Math.max(0, Math.min(...allVals) - 20);
  const max = Math.max(...allVals) + 20;
  const xStep = labs.length > 1 ? (W - 2 * P) / (labs.length - 1) : 0;
  const yPos = v => H - P - ((v - min) / (max - min)) * (H - 2 * P);

  const linePath = (key) => labs.map((l, i) => {
    if (l[key] == null) return null;
    return `${i === 0 ? "M" : "L"} ${P + i * xStep} ${yPos(l[key])}`;
  }).filter(Boolean).join(" ");

  const dots = (key, color) => labs.map((l, i) => {
    if (l[key] == null) return "";
    return `<circle cx="${P + i * xStep}" cy="${yPos(l[key])}" r="3.5" fill="${color}"/>`;
  }).join("");

  return `
    <div class="lab-chart-card">
      <div class="card-eyebrow">Trend</div>
      <div class="card-title">Your progress</div>
      <svg class="lab-chart-svg" viewBox="0 0 ${W} ${H}">
        <line x1="${P}" y1="${H - P}" x2="${W - P}" y2="${H - P}" stroke="rgba(255,255,255,0.1)"/>
        <line x1="${P}" y1="${P}" x2="${P}" y2="${H - P}" stroke="rgba(255,255,255,0.1)"/>
        <path d="${linePath("ldl")}" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="${linePath("hdl")}" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots("ldl", "#ef4444")}
        ${dots("hdl", "#10b981")}
      </svg>
      <div class="lab-chart-legend">
        <div class="lab-legend-item"><span class="lab-legend-dot" style="background:#ef4444"></span>LDL</div>
        <div class="lab-legend-item"><span class="lab-legend-dot" style="background:#10b981"></span>HDL</div>
      </div>
    </div>
  `;
}

function readLabFormEntry() {
  const date = document.getElementById("lab-date").value;
  const ldl = document.getElementById("lab-ldl").value;
  const hdl = document.getElementById("lab-hdl").value;
  const total = document.getElementById("lab-total").value;
  const trig = document.getElementById("lab-trig").value;
  if (!date) return null;
  return {
    date,
    ldl: ldl ? Number(ldl) : null,
    hdl: hdl ? Number(hdl) : null,
    total: total ? Number(total) : null,
    trig: trig ? Number(trig) : null,
  };
}
function saveLabEntry(entry) {
  state.labs = state.labs.filter(l => l.date !== entry.date);
  state.labs.push(entry);
  saveLabs();
}
function addLabEntry(e) {
  e.preventDefault();
  const entry = readLabFormEntry();
  if (!entry) return;
  saveLabEntry(entry);
  render();
}
function saveLabAndAskCora() {
  const entry = readLabFormEntry();
  if (!entry) { alert("Please enter a date."); return; }
  const hasAny = entry.ldl || entry.hdl || entry.total || entry.trig;
  if (!hasAny) { alert("Please fill in at least one reading."); return; }
  saveLabEntry(entry);

  // Build a natural-language message from the reading
  const parts = [];
  if (entry.ldl) parts.push(`LDL ${entry.ldl} mg/dL`);
  if (entry.hdl) parts.push(`HDL ${entry.hdl} mg/dL`);
  if (entry.total) parts.push(`total cholesterol ${entry.total} mg/dL`);
  if (entry.trig) parts.push(`triglycerides ${entry.trig} mg/dL`);

  // If we have prior readings, mention the trend
  const priorLabs = [...state.labs].filter(l => l.date !== entry.date).sort((a,b) => a.date.localeCompare(b.date));
  const prev = priorLabs[priorLabs.length - 1];
  let trendText = "";
  if (prev) {
    const trends = [];
    if (prev.ldl && entry.ldl) trends.push(`LDL ${entry.ldl - prev.ldl >= 0 ? "up" : "down"} ${Math.abs(entry.ldl - prev.ldl)}`);
    if (prev.hdl && entry.hdl) trends.push(`HDL ${entry.hdl - prev.hdl >= 0 ? "up" : "down"} ${Math.abs(entry.hdl - prev.hdl)}`);
    if (prev.total && entry.total) trends.push(`total ${entry.total - prev.total >= 0 ? "up" : "down"} ${Math.abs(entry.total - prev.total)}`);
    if (prev.trig && entry.trig) trends.push(`triglycerides ${entry.trig - prev.trig >= 0 ? "up" : "down"} ${Math.abs(entry.trig - prev.trig)}`);
    if (trends.length) trendText = ` Compared to my last reading on ${formatDate(prev.date)}: ${trends.join(", ")}.`;
  }

  const message = `I just logged my latest lab results on ${formatDate(entry.date)}: ${parts.join(", ")}.${trendText} Based on these numbers, what habits or lifestyle changes should I focus on right now? Please keep in mind I'm taking HealthyBlood daily.`;

  state.tab = "chat";
  render();
  setTimeout(() => sendChat(message), 150);
}

  if (!confirm("Delete this lab reading?")) return;
  state.labs = state.labs.filter(l => l.date !== date);
  saveLabs();
  render();
}

// === Reminder notifications ===
async function requestNotificationPermission() {
  if (!("Notification" in window)) {
    alert("This device doesn't support notifications.");
    return false;
  }
  if (Notification.permission === "granted") return true;
  if (Notification.permission === "denied") {
    alert("Notifications are blocked. Please enable them in your browser settings.");
    return false;
  }
  const result = await Notification.requestPermission();
  return result === "granted";
}

async function toggleReminder(habitId) {
  const r = state.reminders[habitId];
  if (!r.enabled) {
    const ok = await requestNotificationPermission();
    if (!ok) return;
  }
  r.enabled = !r.enabled;
  saveReminders();
  scheduleReminders();
  render();
}
function updateReminderTime(habitId, time) {
  state.reminders[habitId].time = time;
  saveReminders();
  scheduleReminders();
}
window.toggleReminder = toggleReminder;
window.updateReminderTime = updateReminderTime;

// Simple in-page reminder scheduler — checks every minute
let reminderInterval = null;
function scheduleReminders() {
  if (reminderInterval) clearInterval(reminderInterval);
  reminderInterval = setInterval(() => {
    if (Notification.permission !== "granted") return;
    const now = new Date();
    const hhmm = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    const lastFiredKey = "hb_last_fired_" + todayKey();
    const lastFired = JSON.parse(localStorage.getItem(lastFiredKey) || "{}");
    Object.entries(state.reminders).forEach(([habitId, r]) => {
      if (!r.enabled) return;
      if (r.time !== hhmm) return;
      if (lastFired[habitId]) return;
      const habit = HABITS.find(h => h.id === habitId);
      if (!habit) return;
      // Skip if already done today
      if (habitsForDay(todayKey())[habitId]) return;
      try {
        new Notification("HealthyBlood", {
          body: habit.title,
          icon: "/app/icon-192.png",
          tag: "hb-" + habitId,
        });
      } catch (e) { /* ignore */ }
      lastFired[habitId] = true;
      localStorage.setItem(lastFiredKey, JSON.stringify(lastFired));
    });
  }, 60000);
}

// Parse Seal's interval string ("1 month", "2 week") into { count, unit }
function parseInterval(str) {
  if (!str) return { count: 1, unit: "month" };
  const parts = str.trim().split(/\s+/);
  return { count: parseInt(parts[0]) || 1, unit: parts[1] || "month" };
}

function renderSubCard(sub) {

  const status = (sub.status || "ACTIVE").toLowerCase();

  const isCancelled = status === "cancelled" || status === "canceled" || status === "expired";
  const busy = String(state.actionBusy) === String(sub.id);
  const showCancelFlow = String(state.cancelFlowId) === String(sub.id);

  // Seal data shape: items[], delivery_interval "1 month", total_value, billing_attempts[]
  const productName = sub.items?.[0]?.title || "HealthyBlood Cholesterol Cleanse";
  const { count: intervalCount, unit: intervalUnit } = parseInterval(sub.delivery_interval || sub.billing_interval);
  const qty = sub.items?.[0]?.quantity || 1;
  const currentFreq = `${intervalCount}_${intervalUnit}`;

  // Next billing: find the earliest upcoming billing attempt
  const now = new Date();
  const skipStatuses = ["completed", "skipped", "failed", "cancelled", "canceled", "refunded"];
  const upcoming = (sub.billing_attempts || [])
    .filter(a => {
      const st = (a.status || "").toLowerCase();
      return !skipStatuses.includes(st) && new Date(a.date || a.billing_date || a.scheduled_at) > now;
    })
    .sort((a, b) => new Date(a.date || a.billing_date) - new Date(b.date || b.billing_date));
  // Fallback: Seal often puts next date directly on the subscription object

  return `

            <option value="3_month" ${currentFreq === "3_month" ? "selected" : ""}>3 months</option>

// Seal edit: PUT /subscription { id, action: "edit", edit: { delivery_interval: "2 month", billing_interval: "2 month" } }
function updateSubFrequency(id, val) {
  const [count, unit] = val.split("_");
  const intervalStr = `${count} ${unit}`;
  state.actionBusy = id; state.banner = null; render();
  apiPost(`/hb/subscription/${id}/edit`, {
    delivery_interval: intervalStr,
    billing_interval: intervalStr,
  }).then(() => {

    state.actionBusy = null;
    loadSubs();
  }).catch(e => {
    state.banner = { type: "error", msg: e.message };
    state.actionBusy = null;
    render();
    setTimeout(() => { state.banner = null; render(); }, 4000);
  });
}
// Quantity change: Seal doesn't have a direct qty edit, so we remove + re-add the item
// For now, show a banner explaining how to adjust quantity
function updateSubQty(id, qty) {
  if (qty < 1) return;
  const sub = state.subs?.find(s => String(s.id) === String(id));
  if (!sub || !sub.items?.[0]) return;
  state.actionBusy = id; state.banner = null; render();

  const item = sub.items[0];
  // Add new item first, THEN remove old — Seal won't let you remove the last item
  const addBody = {
    id: parseInt(id),
    action: "add_items",
    add_items: [{
      product_id: item.product_id,
      variant_id: item.variant_id,
      quantity: qty,
      title: item.title,
      sku: item.variant_sku || null,
      price: item.original_price || item.price,
      taxable: item.taxable || 0,
      requires_shipping: item.requires_shipping || 1,
      one_time: 0,
    }],
  };
  const removeBody = { id: parseInt(id), action: "remove_items", remove_items: [item.id] };

  // Sequential: add first, then remove old — keeps subscription non-empty at all times
  fetch(API + `/hb/subscription/${id}/edit-items`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ add: addBody, remove: removeBody }),
  }).then(r => r.json()).then(data => {
    if (data.error) throw new Error(data.error);
    state.banner = { type: "success", msg: "Quantity updated!" };
    state.actionBusy = null;
    loadSubs();
  }).catch(e => {
    state.banner = { type: "error", msg: e.message };
    state.actionBusy = null;
    render();
    setTimeout(() => { state.banner = null; render(); }, 4000);
  });
}
// Skip uses the billing attempt endpoint
function skipNext(subId, billingAttemptId) {
  if (!billingAttemptId) {
    state.banner = { type: "error", msg: "No upcoming delivery to skip." };
    render();

  state.actionBusy = subId; state.banner = null; render();
  apiPost(`/hb/subscription/${subId}/skip-next`, { billingAttemptId }).then(() => {
    state.banner = { type: "success", msg: "Next delivery skipped!" };
    state.actionBusy = null;
    loadSubs();
  }).catch(e => {
    state.banner = { type: "error", msg: e.message };
    state.actionBusy = null;
    render();
    setTimeout(() => { state.banner = null; render(); }, 4000);
  });
}

              </div>
              <div class="toggle ${r.enabled ? "on" : ""}" data-toggle="${id}"></div>
            </div>
          `;
        }).join("")}
      </div>

      <div class="profile-row" onclick="window.open('https://www.tryhealthyblood.com','_blank')">
        <div class="label"><span class="label-icon">🛒</span>Shop HealthyBlood</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="window.open('mailto:support@tryhealthyblood.com')">
        <div class="label"><span class="label-icon">✉️</span>Contact Support</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="clearChat()">
        <div class="label"><span class="label-icon">💬</span>Clear chat with Cora</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="logout()" style="margin-top:24px;border-color:rgba(239,68,68,0.25)">
        <div class="label" style="color:var(--danger)"><span class="label-icon" style="background:rgba(239,68,68,0.1);color:var(--danger)">⏻</span>Sign out</div>
        <div class="arrow">›</div>
      </div>

      <p style="text-align:center;color:var(--text-muted);font-size:11px;margin-top:30px;line-height:1.6;padding:0 20px">
        HealthyBlood™ statements have not been evaluated by the FDA.<br>
        This product is not intended to diagnose, treat, cure, or prevent any disease.<br>
        Always consult your physician.
      </p>
    </div>
  `;
}
function logout() {
  if (confirm("Sign out and clear all your data on this device?")) {
    localStorage.removeItem("hb_email");
    localStorage.removeItem("hb_chat");
    localStorage.removeItem("hb_member_since");
    state.email = "";
    state.chat = [];
    state.subs = null;
    state.tab = "home";
    render();
  }
}
function clearChat() {
  if (confirm("Clear your chat history with Cora?")) {
    state.chat = [];
    saveChat();
    render();
  }
}
window.logout = logout;
window.clearChat = clearChat;

// === Bottom Nav (icon-based, no HB logo) ===
function viewNav() {
  const tabs = [
    { id: "home",    label: "Today",   icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12L12 3l9 9M5 10v10h14V10" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "chat",    label: "Cora",    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 21l1.9-5.4A8 8 0 1 1 21 12Z" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "health",  label: "Health",  icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6Z" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "subs",    label: "Plan",    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 8V21H3V8M1 3h22v5H1zM10 12h4" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "profile", label: "You",     icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0" stroke-linecap="round"/></svg>` },
  ];
  return `
    <div class="nav">
      ${tabs.map(t => `
        <button class="${state.tab === t.id ? "active" : ""}" data-tab="${t.id}">
          <div class="nav-icon">${t.icon}</div>
          <div>${t.label}</div>
        </button>
      `).join("")}
    </div>
  `;
}

// === Render ===
function render() {
  const root = document.getElementById("app");

  if (!state.email) {
    root.innerHTML = viewWelcome();
    bindWelcome();
    return;
  }

  if (!state.onboarded) {
    root.innerHTML = viewOnboarding();
    bindOnboarding();
    return;
  }

  let mainContent = "";
  if (state.tab === "home") mainContent = viewHome();
  else if (state.tab === "chat") mainContent = viewChat();
  else if (state.tab === "health") mainContent = viewHealth();
  else if (state.tab === "subs") mainContent = viewSubs();
  else if (state.tab === "profile") mainContent = viewProfile();

  root.innerHTML = `<div class="main">${mainContent}</div>${viewNav()}`;
  bindEvents();
}

function bindWelcome() {
  const input = document.getElementById("welcomeEmail");
  const btn = document.getElementById("welcomeBtn");
  const submit = () => {
    const v = input.value.trim();
    if (!v || !v.includes("@")) {
      input.style.borderColor = "var(--danger)";
      input.focus();
      return;
    }
    saveEmail(v);
    state.tab = "home";
    render();
  };
  btn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  setTimeout(() => input.focus(), 100);
}

function bindEvents() {
  // Bottom nav
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.addEventListener("click", () => {
      const tab = btn.getAttribute("data-tab");
      state.tab = tab;
      render();
      if (tab === "subs" && !state.subs && !state.subsLoading) loadSubs();
    });
  });

  // Habit checkboxes
  document.querySelectorAll(".habit-row").forEach(row => {
    row.addEventListener("click", () => {
      const id = row.getAttribute("data-habit");
      const today = todayKey();
      const prevStreak = calcStreak();
      if (!state.habits[today]) state.habits[today] = {};
      state.habits[today][id] = !state.habits[today][id];
      saveHabits();
      const newStreak = calcStreak();
      const milestone = checkMilestone(prevStreak, newStreak);
      render();
      if (milestone) showMilestone(milestone);
    });
  });

  // Chat input
  const chatInput = document.getElementById("chatInput");
  const chatSend = document.getElementById("chatSend");
  if (chatInput && chatSend) {
    const send = () => {
      const v = chatInput.value;
      chatInput.value = "";
      sendChat(v);
    };
    chatSend.addEventListener("click", send);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  }

  // Quick questions
  document.querySelectorAll(".quick-q").forEach(b => {
    b.addEventListener("click", () => {
      const q = b.getAttribute("data-q");
      sendChat(q);
    });
  });

  // Auto-load subs when entering tab
  if (state.tab === "subs" && !state.subs && !state.subsLoading && !state.subsError) {
    loadSubs();
  }

  // Health sub-tabs
  document.querySelectorAll(".subtab").forEach(b => {
    b.addEventListener("click", () => {
      state.healthSubtab = b.getAttribute("data-subtab");
      state.selectedRecipe = null;
      render();
    });
  });

  // Recipe category pills
  document.querySelectorAll(".recipe-cat-pill").forEach(b => {
    b.addEventListener("click", () => {
      state.recipeCategory = b.getAttribute("data-cat");
      render();
    });
  });

  // Lab form submit
  const labForm = document.getElementById("labForm");
  if (labForm) labForm.addEventListener("submit", addLabEntry);
  const labCoraBtn = document.getElementById("labCoraBtn");
  if (labCoraBtn) labCoraBtn.addEventListener("click", saveLabAndAskCora);

  // Reminder toggles
  document.querySelectorAll(".toggle[data-toggle]").forEach(el => {
    el.addEventListener("click", () => toggleReminder(el.getAttribute("data-toggle")));
  });
  // Reminder time inputs
  document.querySelectorAll(".reminder-time[data-reminder]").forEach(input => {
    input.addEventListener("change", () => updateReminderTime(input.getAttribute("data-reminder"), input.value));
  });
}

// === Utilities ===
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escMulti(s) {
  return esc(s).replace(/\n/g, "<br>");
}

// === Boot ===
render();
scheduleReminders();
// Load subscriptions in background on boot (needed for Cora gating)
if (state.email && state.onboarded && !state.subs && !state.subsLoading) {
  loadSubs();
}
</script>
</body>
</html>
