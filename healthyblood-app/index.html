<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a1f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HealthyBlood">
<link rel="manifest" href="manifest.json">
<title>HealthyBlood — Your Wellness Companion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #0a1f14;
    color: #f0fdf4;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  a { color: #4ade80; text-decoration: none; }

  /* === Layout === */
  .app {
    display: flex;
    flex-direction: column;
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    background: #0a1f14;
    position: relative;
  }
  .header {
    padding: 18px 20px 14px;
    padding-top: calc(18px + env(safe-area-inset-top));
    border-bottom: 1px solid #1a3a2e;
    background: linear-gradient(180deg, #0f2818 0%, #0a1f14 100%);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .brand-logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #0a1f14;
    font-weight: 900;
  }
  .brand-text { color: #f0fdf4; }
  .brand-text span { color: #4ade80; }
  .header-greeting {
    font-size: 13px;
    color: #86b69a;
    margin-top: 4px;
  }

  .main {
    flex: 1;
    overflow-y: auto;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }

  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(15, 40, 24, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid #1a3a2e;
    display: flex;
    padding: 8px 0;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    z-index: 20;
  }
  .nav button {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    color: #5a8a6f;
    font-size: 11px;
    font-weight: 600;
    transition: color 0.2s;
  }
  .nav button.active { color: #4ade80; }
  .nav-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  /* === Cards & Sections === */
  .section { padding: 20px; }
  .section h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.4px;
  }
  .section .subtitle {
    font-size: 14px;
    color: #86b69a;
    margin-bottom: 18px;
  }
  .card {
    background: linear-gradient(180deg, #15321f 0%, #122a19 100%);
    border: 1px solid #1f4d2d;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #86b69a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* === Buttons === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 22px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: #0a1f14;
    font-weight: 700;
    font-size: 15px;
    border-radius: 12px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(34, 197, 94, 0.25);
  }
  .btn:active { transform: scale(0.97); }
  .btn.full { width: 100%; }
  .btn.ghost {
    background: transparent;
    border: 1px solid #1f4d2d;
    color: #86b69a;
    box-shadow: none;
  }
  .btn.danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    box-shadow: 0 4px 14px rgba(239, 68, 68, 0.2);
  }
  .btn.small { padding: 9px 14px; font-size: 13px; }

  /* === Habit tracker === */
  .check-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #15321f, #122a19);
    border: 2px solid #1f4d2d;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    position: relative;
    transition: all 0.3s;
  }
  .check-circle.done {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-color: #4ade80;
    box-shadow: 0 0 40px rgba(34, 197, 94, 0.3);
  }
  .check-circle .check-icon {
    font-size: 56px;
    color: #1f4d2d;
    transition: color 0.3s;
  }
  .check-circle.done .check-icon { color: #fff; }
  .check-label {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .check-sub {
    text-align: center;
    font-size: 13px;
    color: #86b69a;
    margin-bottom: 18px;
  }
  .streak-row {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    padding: 16px 0;
  }
  .streak-stat {
    text-align: center;
    flex: 1;
  }
  .streak-stat .num {
    font-size: 28px;
    font-weight: 800;
    color: #4ade80;
    line-height: 1;
  }
  .streak-stat .label {
    font-size: 11px;
    color: #86b69a;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .week-dots {
    display: flex;
    gap: 6px;
    justify-content: space-between;
    margin-top: 12px;
  }
  .week-day {
    flex: 1;
    text-align: center;
  }
  .week-day .dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1a3a2e;
    border: 2px solid #1f4d2d;
    margin: 0 auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #5a8a6f;
  }
  .week-day .dot.done {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-color: #4ade80;
    color: #fff;
  }
  .week-day .dot.today {
    border-color: #4ade80;
  }
  .week-day .label {
    font-size: 10px;
    color: #5a8a6f;
    text-transform: uppercase;
    font-weight: 600;
  }
  .tip-card {
    background: linear-gradient(135deg, #15321f, #1a3a2e);
    border-left: 3px solid #4ade80;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .tip-card .tip-label {
    font-size: 11px;
    font-weight: 700;
    color: #4ade80;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .tip-card .tip-text {
    font-size: 14px;
    line-height: 1.5;
    color: #d1fae5;
  }

  /* === Chat === */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 100px;
  }
  .chat-bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #0a1f14;
    border-bottom-right-radius: 6px;
    font-weight: 500;
  }
  .chat-bubble.ai {
    align-self: flex-start;
    background: #15321f;
    border: 1px solid #1f4d2d;
    color: #f0fdf4;
    border-bottom-left-radius: 6px;
  }
  .chat-bubble.thinking {
    color: #86b69a;
    font-style: italic;
  }
  .chat-input-bar {
    position: fixed;
    bottom: calc(72px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(10, 31, 20, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 16px;
    border-top: 1px solid #1a3a2e;
    display: flex;
    gap: 10px;
    z-index: 15;
  }
  .chat-input-bar input {
    flex: 1;
    background: #15321f;
    border: 1px solid #1f4d2d;
    border-radius: 22px;
    padding: 12px 18px;
    color: #f0fdf4;
    font-size: 15px;
    outline: none;
  }
  .chat-input-bar input:focus { border-color: #4ade80; }
  .chat-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #0a1f14;
    font-size: 20px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .chat-empty {
    text-align: center;
    padding: 40px 20px;
    color: #86b69a;
  }
  .chat-empty .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .chat-empty h3 {
    color: #f0fdf4;
    margin-bottom: 8px;
    font-size: 18px;
  }
  .quick-questions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 20px;
  }
  .quick-q {
    background: #15321f;
    border: 1px solid #1f4d2d;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    color: #d1fae5;
    text-align: left;
    transition: all 0.2s;
  }
  .quick-q:hover, .quick-q:active {
    background: #1a3a2e;
    border-color: #4ade80;
  }

  /* === Subscriptions === */
  .sub-card {
    background: linear-gradient(180deg, #15321f, #122a19);
    border: 1px solid #1f4d2d;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .sub-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .sub-title {
    font-size: 16px;
    font-weight: 700;
    color: #f0fdf4;
    margin-bottom: 4px;
  }
  .sub-meta {
    font-size: 13px;
    color: #86b69a;
  }
  .sub-status {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sub-status.active {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }
  .sub-status.paused {
    background: rgba(251, 191, 36, 0.15);
    color: #fbbf24;
    border: 1px solid rgba(251, 191, 36, 0.3);
  }
  .sub-status.cancelled {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .sub-detail {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
    border-top: 1px solid #1a3a2e;
  }
  .sub-detail .key { color: #86b69a; }
  .sub-detail .val { color: #f0fdf4; font-weight: 600; }
  .sub-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  /* === Profile === */
  .profile-card {
    text-align: center;
    padding: 30px 20px;
  }
  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: #0a1f14;
    margin: 0 auto 14px;
  }
  .profile-email {
    font-size: 16px;
    font-weight: 600;
    color: #f0fdf4;
    margin-bottom: 4px;
  }
  .profile-since {
    font-size: 13px;
    color: #86b69a;
    margin-bottom: 22px;
  }
  .profile-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px;
    background: #15321f;
    border: 1px solid #1f4d2d;
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .profile-row:active { background: #1a3a2e; }
  .profile-row .label {
    font-size: 14px;
    font-weight: 600;
    color: #f0fdf4;
  }
  .profile-row .arrow { color: #5a8a6f; font-size: 18px; }

  /* === Welcome screen === */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    background: radial-gradient(ellipse at center, #15321f 0%, #0a1f14 70%);
  }
  .welcome-logo {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: #0a1f14;
    font-weight: 900;
    margin-bottom: 20px;
    box-shadow: 0 0 60px rgba(34, 197, 94, 0.3);
  }
  .welcome h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .welcome h1 span { color: #4ade80; }
  .welcome p {
    font-size: 15px;
    color: #86b69a;
    margin-bottom: 32px;
    line-height: 1.5;
    max-width: 320px;
  }
  .welcome-input {
    width: 100%;
    max-width: 320px;
    background: #15321f;
    border: 1.5px solid #1f4d2d;
    border-radius: 12px;
    padding: 14px 18px;
    color: #f0fdf4;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
  }
  .welcome-input:focus { border-color: #4ade80; }
  .welcome-disclaimer {
    font-size: 11px;
    color: #5a8a6f;
    margin-top: 24px;
    max-width: 280px;
    line-height: 1.5;
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: #86b69a;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
  .empty-state h3 { color: #f0fdf4; font-size: 17px; margin-bottom: 6px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .error-banner {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .success-banner {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(74, 222, 128, 0.2);
    border-top-color: #4ade80;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state {
    text-align: center;
    padding: 50px 20px;
    color: #86b69a;
  }
  .loading-state .spinner { margin-bottom: 14px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// =====================================================
// HealthyBlood PWA — main app
// =====================================================
const API = window.location.hostname === "localhost"
  ? "http://localhost:3001/api"
  : "https://veo3-command-center.onrender.com/api";

// === State ===
const state = {
  email: localStorage.getItem("hb_email") || "",
  tab: "home",
  habits: JSON.parse(localStorage.getItem("hb_habits") || "{}"), // { "2026-04-09": true }
  chat: JSON.parse(localStorage.getItem("hb_chat") || "[]"),
  chatBusy: false,
  subs: null,
  subsLoading: false,
  subsError: null,
  actionBusy: null, // subscription id currently being acted on
  banner: null, // {type, msg}
};

// === Storage helpers ===
const saveHabits = () => localStorage.setItem("hb_habits", JSON.stringify(state.habits));
const saveChat = () => localStorage.setItem("hb_chat", JSON.stringify(state.chat));
const saveEmail = (e) => { state.email = e; localStorage.setItem("hb_email", e); };

// === Date helpers ===
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const dayKey = (offset) => {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const calcStreak = () => {
  let s = 0;
  for (let i = 0; i < 365; i++) {
    if (state.habits[dayKey(-i)]) s++;
    else if (i > 0) break;
  }
  return s;
};
const calcTotalDays = () => Object.keys(state.habits).filter(k => state.habits[k]).length;

// === Daily tips ===
const TIPS = [
  "Take HealthyBlood at the same time each day for best absorption.",
  "Pair your daily dropper with a glass of water and a 20-minute walk.",
  "Consistency matters more than perfection — small daily wins compound.",
  "Try mixing your drops with a splash of orange juice if you prefer the taste.",
  "Hydration helps your body process supplements more efficiently.",
  "A whole-food diet amplifies the benefits of your daily routine.",
  "Most customers feel steadier energy after 4-8 weeks of daily use.",
  "Stress management is just as important as supplementation. Breathe deep.",
  "Quality sleep (7-9 hours) supports your cardiovascular health.",
  "Walking after meals can support healthy cholesterol levels.",
  "Take your dropper with food for the smoothest experience.",
  "Track how you FEEL, not just numbers. Energy and mood matter.",
];
const dailyTip = () => {
  const d = new Date();
  const day = Math.floor(d.getTime() / 86400000);
  return TIPS[day % TIPS.length];
};

// === API helpers ===
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || `Error ${r.status}`);
  return data;
}
async function apiGet(path) {
  const r = await fetch(API + path);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || `Error ${r.status}`);
  return data;
}

// === Welcome / Auth ===
function viewWelcome() {
  return `
    <div class="welcome">
      <div class="welcome-logo">HB</div>
      <h1>Welcome to <span>HealthyBlood</span></h1>
      <p>Your daily wellness companion for getting the most out of HealthyBlood™ Cholesterol Cleanse.</p>
      <input class="welcome-input" id="welcomeEmail" type="email" placeholder="Your email address" autocomplete="email">
      <button class="btn full" id="welcomeBtn" style="max-width:320px">Get Started</button>
      <p class="welcome-disclaimer">
        We use your email to find your active subscriptions and personalize your experience. We never share it.
      </p>
    </div>
  `;
}

// === Home / Habit tracker ===
function viewHome() {
  const today = todayKey();
  const checkedToday = !!state.habits[today];
  const streak = calcStreak();
  const totalDays = calcTotalDays();
  const firstName = state.email ? state.email.split("@")[0].split(/[._]/)[0] : "friend";
  const greeting = getGreeting();

  // Last 7 days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const k = dayKey(-i);
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push({
      key: k,
      label: d.toLocaleDateString("en-US", { weekday: "short" }).slice(0, 1),
      done: !!state.habits[k],
      today: i === 0,
    });
  }

  return `
    <div class="header">
      <div class="header-row">
        <div class="brand">
          <div class="brand-logo">HB</div>
          <div>
            <div class="brand-text">Healthy<span>Blood</span></div>
          </div>
        </div>
      </div>
      <div class="header-greeting">${greeting}, ${esc(capitalize(firstName))} 🌿</div>
    </div>
    <div class="section">
      <div class="card">
        <div class="check-circle ${checkedToday ? "done" : ""}" id="checkCircle">
          <div class="check-icon">${checkedToday ? "✓" : "○"}</div>
        </div>
        <div class="check-label">${checkedToday ? "You're all set for today!" : "Did you take your drops today?"}</div>
        <div class="check-sub">${checkedToday ? "Great work staying consistent." : "Tap the circle to check in."}</div>

        <div class="streak-row">
          <div class="streak-stat">
            <div class="num">${streak}</div>
            <div class="label">Day Streak</div>
          </div>
          <div class="streak-stat">
            <div class="num">${totalDays}</div>
            <div class="label">Total Days</div>
          </div>
        </div>

        <div class="week-dots">
          ${days.map(d => `
            <div class="week-day">
              <div class="dot ${d.done ? "done" : ""} ${d.today ? "today" : ""}">${d.done ? "✓" : ""}</div>
              <div class="label">${d.label}</div>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="tip-card">
        <div class="tip-label">💡 Tip of the day</div>
        <div class="tip-text">${esc(dailyTip())}</div>
      </div>
    </div>
  `;
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  return "Good evening";
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }

// === Chat ===
function viewChat() {
  const empty = state.chat.length === 0;
  return `
    <div class="header">
      <div class="brand">
        <div class="brand-logo">HB</div>
        <div class="brand-text">AI Wellness Coach</div>
      </div>
      <div class="header-greeting">Ask me anything about HealthyBlood or wellness</div>
    </div>
    <div class="chat-area" id="chatArea">
      ${empty ? `
        <div class="chat-empty">
          <div class="icon">💬</div>
          <h3>Hi! I'm your wellness coach.</h3>
          <p>Ask me about HealthyBlood, healthy habits, or how to get the best results from your daily routine.</p>
          <div class="quick-questions">
            <button class="quick-q" data-q="How should I take my HealthyBlood drops?">How should I take my drops?</button>
            <button class="quick-q" data-q="What's the best time of day to take HealthyBlood?">Best time of day to take it?</button>
            <button class="quick-q" data-q="How long until I notice results?">How long until I notice results?</button>
            <button class="quick-q" data-q="What habits should I pair with HealthyBlood for the best results?">Best habits to pair with it?</button>
          </div>
        </div>
      ` : state.chat.map(m => `
        <div class="chat-bubble ${m.role}">${escMulti(m.content)}</div>
      `).join("") + (state.chatBusy ? `<div class="chat-bubble ai thinking">Thinking…</div>` : "")}
    </div>
    <div class="chat-input-bar">
      <input id="chatInput" type="text" placeholder="Ask anything…" autocomplete="off">
      <button class="chat-send" id="chatSend">→</button>
    </div>
  `;
}

async function sendChat(text) {
  if (!text.trim() || state.chatBusy) return;
  state.chat.push({ role: "user", content: text.trim() });
  state.chatBusy = true;
  saveChat(); render();

  // Auto-scroll
  setTimeout(() => {
    const area = document.getElementById("chatArea");
    if (area) area.scrollTop = area.scrollHeight;
  }, 50);

  try {
    const data = await apiPost("/hb/chat", { messages: state.chat });
    const reply = data.choices?.[0]?.message?.content || "Sorry, I didn't catch that. Could you try again?";
    state.chat.push({ role: "assistant", content: reply });
  } catch (e) {
    state.chat.push({ role: "assistant", content: "Sorry, I'm having trouble connecting right now. Please try again in a moment." });
  }
  state.chatBusy = false;
  saveChat(); render();
  setTimeout(() => {
    const area = document.getElementById("chatArea");
    if (area) area.scrollTop = area.scrollHeight;
  }, 50);
}

// === Subscriptions ===
function viewSubs() {
  return `
    <div class="header">
      <div class="brand">
        <div class="brand-logo">HB</div>
        <div class="brand-text">My Subscription</div>
      </div>
      <div class="header-greeting">Manage your HealthyBlood deliveries</div>
    </div>
    <div class="section">
      ${state.banner ? `<div class="${state.banner.type}-banner">${esc(state.banner.msg)}</div>` : ""}
      ${renderSubsContent()}
    </div>
  `;
}
function renderSubsContent() {
  if (state.subsLoading) {
    return `<div class="loading-state"><div class="spinner"></div><div>Loading your subscriptions…</div></div>`;
  }
  if (state.subsError) {
    return `<div class="error-banner">${esc(state.subsError)}</div>
      <button class="btn full ghost" onclick="loadSubs()">Try Again</button>`;
  }
  if (!state.subs || state.subs.length === 0) {
    return `
      <div class="empty-state">
        <div class="icon">📦</div>
        <h3>No active subscriptions</h3>
        <p>We couldn't find any subscriptions tied to <strong>${esc(state.email)}</strong>.</p>
        <br>
        <a class="btn" href="https://www.tryhealthyblood.com" target="_blank">Browse Products</a>
      </div>
    `;
  }
  return state.subs.map(sub => renderSubCard(sub)).join("");
}
function renderSubCard(sub) {
  const status = (sub.status || "active").toLowerCase();
  const isPaused = status === "paused";
  const isCancelled = status === "cancelled" || status === "canceled";
  const busy = state.actionBusy === sub.id;
  const productName = sub.product_title || sub.line_items?.[0]?.title || "HealthyBlood Cholesterol Cleanse";
  const interval = sub.billing_interval || sub.interval || "month";
  const intervalCount = sub.billing_interval_count || sub.interval_count || 1;
  const nextCharge = sub.next_billing_date || sub.next_charge_scheduled_at || null;
  const price = sub.price ? `$${parseFloat(sub.price).toFixed(2)}` : "—";

  return `
    <div class="sub-card">
      <div class="sub-header">
        <div>
          <div class="sub-title">${esc(productName)}</div>
          <div class="sub-meta">Every ${intervalCount} ${interval}${intervalCount > 1 ? "s" : ""}</div>
        </div>
        <div class="sub-status ${status}">${status}</div>
      </div>
      <div class="sub-detail">
        <span class="key">Next delivery</span>
        <span class="val">${nextCharge ? formatDate(nextCharge) : "—"}</span>
      </div>
      <div class="sub-detail">
        <span class="key">Price</span>
        <span class="val">${price}</span>
      </div>
      ${!isCancelled ? `
        <div class="sub-actions">
          ${busy ? `
            <div style="grid-column:1/-1;text-align:center;padding:10px"><span class="spinner"></span></div>
          ` : isPaused ? `
            <button class="btn small" onclick="subAction('${sub.id}','resume')">▶ Resume</button>
            <button class="btn small danger" onclick="subAction('${sub.id}','cancel')">Cancel</button>
          ` : `
            <button class="btn small ghost" onclick="subAction('${sub.id}','skip')">Skip Next</button>
            <button class="btn small ghost" onclick="subAction('${sub.id}','pause')">Pause</button>
          `}
        </div>
      ` : ""}
    </div>
  `;
}
function formatDate(d) {
  try {
    return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  } catch { return d; }
}
async function loadSubs() {
  state.subsLoading = true; state.subsError = null; render();
  try {
    const data = await apiGet(`/hb/subscriptions?email=${encodeURIComponent(state.email)}`);
    state.subs = Array.isArray(data) ? data : (data.subscriptions || data.data || []);
  } catch (e) {
    state.subsError = e.message;
    state.subs = null;
  }
  state.subsLoading = false; render();
}
async function subAction(id, action) {
  state.actionBusy = id; state.banner = null; render();
  try {
    await apiPost(`/hb/subscription/${id}/${action}`, {});
    state.banner = { type: "success", msg: `Subscription ${action}d successfully.` };
    await loadSubs();
  } catch (e) {
    state.banner = { type: "error", msg: e.message };
  }
  state.actionBusy = null; render();
  setTimeout(() => { state.banner = null; render(); }, 4000);
}
window.loadSubs = loadSubs;
window.subAction = subAction;

// === Profile ===
function viewProfile() {
  const initial = state.email ? state.email[0].toUpperCase() : "?";
  const sinceDate = localStorage.getItem("hb_member_since") || todayKey();
  if (!localStorage.getItem("hb_member_since")) localStorage.setItem("hb_member_since", sinceDate);

  return `
    <div class="header">
      <div class="brand">
        <div class="brand-logo">HB</div>
        <div class="brand-text">Profile</div>
      </div>
      <div class="header-greeting">Your account</div>
    </div>
    <div class="section">
      <div class="card profile-card">
        <div class="avatar">${initial}</div>
        <div class="profile-email">${esc(state.email)}</div>
        <div class="profile-since">Member since ${formatDate(sinceDate)}</div>
        <div class="streak-row" style="margin-top:10px">
          <div class="streak-stat">
            <div class="num">${calcStreak()}</div>
            <div class="label">Streak</div>
          </div>
          <div class="streak-stat">
            <div class="num">${calcTotalDays()}</div>
            <div class="label">Total Days</div>
          </div>
        </div>
      </div>

      <div class="profile-row" onclick="window.open('https://www.tryhealthyblood.com','_blank')">
        <div class="label">🛒 Shop HealthyBlood</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="window.open('mailto:support@tryhealthyblood.com')">
        <div class="label">📧 Contact Support</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="clearChat()">
        <div class="label">🗑️ Clear chat history</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="logout()" style="margin-top:20px;border-color:rgba(239,68,68,0.3)">
        <div class="label" style="color:#f87171">Sign out</div>
        <div class="arrow">›</div>
      </div>

      <p style="text-align:center;color:#5a8a6f;font-size:11px;margin-top:30px;line-height:1.5">
        HealthyBlood™ statements have not been evaluated by the FDA.<br>
        This product is not intended to diagnose, treat, cure, or prevent any disease.<br>
        Always consult your physician.
      </p>
    </div>
  `;
}
function logout() {
  if (confirm("Sign out and clear all your data on this device?")) {
    localStorage.removeItem("hb_email");
    localStorage.removeItem("hb_chat");
    localStorage.removeItem("hb_member_since");
    state.email = "";
    state.chat = [];
    state.subs = null;
    state.tab = "home";
    render();
  }
}
function clearChat() {
  if (confirm("Clear your chat history with the AI assistant?")) {
    state.chat = [];
    saveChat();
    render();
  }
}
window.logout = logout;
window.clearChat = clearChat;

// === Bottom Nav ===
function viewNav() {
  const tabs = [
    { id: "home", icon: "🌿", label: "Home" },
    { id: "chat", icon: "💬", label: "Coach" },
    { id: "subs", icon: "📦", label: "Subs" },
    { id: "profile", icon: "👤", label: "You" },
  ];
  return `
    <div class="nav">
      ${tabs.map(t => `
        <button class="${state.tab === t.id ? "active" : ""}" data-tab="${t.id}">
          <div class="nav-icon">${t.icon}</div>
          <div>${t.label}</div>
        </button>
      `).join("")}
    </div>
  `;
}

// === Main render ===
function render() {
  const root = document.getElementById("app");

  if (!state.email) {
    root.innerHTML = viewWelcome();
    bindWelcome();
    return;
  }

  let mainContent = "";
  if (state.tab === "home") mainContent = viewHome();
  else if (state.tab === "chat") mainContent = viewChat();
  else if (state.tab === "subs") mainContent = viewSubs();
  else if (state.tab === "profile") mainContent = viewProfile();

  root.innerHTML = `<div class="main">${mainContent}</div>${viewNav()}`;
  bindEvents();
}

function bindWelcome() {
  const input = document.getElementById("welcomeEmail");
  const btn = document.getElementById("welcomeBtn");
  const submit = () => {
    const v = input.value.trim();
    if (!v || !v.includes("@")) {
      input.style.borderColor = "#ef4444";
      input.focus();
      return;
    }
    saveEmail(v);
    state.tab = "home";
    render();
  };
  btn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  setTimeout(() => input.focus(), 100);
}

function bindEvents() {
  // Bottom nav
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.addEventListener("click", () => {
      const tab = btn.getAttribute("data-tab");
      state.tab = tab;
      render();
      if (tab === "subs" && !state.subs && !state.subsLoading) loadSubs();
    });
  });

  // Habit check circle
  const circle = document.getElementById("checkCircle");
  if (circle) {
    circle.addEventListener("click", () => {
      const t = todayKey();
      state.habits[t] = !state.habits[t];
      saveHabits();
      render();
    });
  }

  // Chat input
  const chatInput = document.getElementById("chatInput");
  const chatSend = document.getElementById("chatSend");
  if (chatInput && chatSend) {
    const send = () => {
      const v = chatInput.value;
      chatInput.value = "";
      sendChat(v);
    };
    chatSend.addEventListener("click", send);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  }

  // Quick questions
  document.querySelectorAll(".quick-q").forEach(b => {
    b.addEventListener("click", () => {
      const q = b.getAttribute("data-q");
      sendChat(q);
    });
  });

  // Auto-load subs when entering tab
  if (state.tab === "subs" && !state.subs && !state.subsLoading && !state.subsError) {
    loadSubs();
  }
}

// === Utilities ===
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escMulti(s) {
  return esc(s).replace(/\n/g, "<br>");
}

// === Boot ===
render();
</script>
</body>
</html>
