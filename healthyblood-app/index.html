<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#062818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HealthyBlood">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:wght@500;600;700;800&display=swap" rel="stylesheet">
<title>HealthyBlood — Your Wellness Companion</title>
<style>
  :root {
    --bg: #062818;
    --bg-deep: #04190f;
    --bg-card: #0c3422;
    --bg-card-hover: #11402b;
    --border: #16553a;
    --border-soft: #0e3a26;
    --accent: #4ade80;
    --accent-bright: #6ee7a3;
    --accent-deep: #16a34a;
    --text: #f0fdf4;
    --text-soft: #a8d5b9;
    --text-muted: #6a9080;
    --danger: #f87171;
    --warning: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  a { color: var(--accent); text-decoration: none; }

  /* === Layout === */
  .app {
    display: flex;
    flex-direction: column;
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    background: var(--bg);
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  /* === Header === */
  .header {
    padding: 24px 22px 20px;
    padding-top: calc(24px + env(safe-area-inset-top));
    background: linear-gradient(180deg, #08311e 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border-soft);
  }
  .wordmark {
    font-family: "Fraunces", Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }
  .wordmark .accent { color: var(--accent); font-style: italic; }
  .header-greeting {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 8px;
    font-weight: 500;
  }
  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }

  /* === Main scroll === */
  .main {
    flex: 1;
    overflow-y: auto;
    padding-bottom: calc(96px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }

  /* === Bottom Nav === */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(6, 40, 24, 0.96);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--border-soft);
    display: flex;
    padding: 10px 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 20;
  }
  .nav button {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 8px 4px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    transition: color 0.2s, transform 0.1s;
    position: relative;
  }
  .nav button.active { color: var(--accent); }
  .nav button.active::before {
    content: "";
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 3px;
    background: var(--accent);
    border-radius: 0 0 3px 3px;
  }
  .nav-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-icon svg { width: 22px; height: 22px; stroke-width: 2; }

  /* === Section === */
  .section { padding: 22px 20px 30px; }

  /* === Cards === */
  .card {
    background: linear-gradient(180deg, var(--bg-card) 0%, #0a2e1d 100%);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .card-eyebrow {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* === Hero progress card === */
  .hero-card {
    background:
      radial-gradient(circle at top right, rgba(74, 222, 128, 0.12), transparent 60%),
      linear-gradient(180deg, var(--bg-card) 0%, #0a2e1d 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 26px 22px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .hero-progress-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 22px;
  }
  .progress-ring {
    position: relative;
    width: 86px;
    height: 86px;
    flex-shrink: 0;
  }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring .ring-bg { stroke: rgba(74, 222, 128, 0.12); }
  .progress-ring .ring-fill {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    filter: drop-shadow(0 0 6px rgba(74, 222, 128, 0.4));
  }
  .progress-ring .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .progress-ring .ring-text small {
    font-family: "Inter", sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .hero-stats {
    flex: 1;
  }
  .hero-stats .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .hero-stats h2 {
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.4px;
  }
  .hero-stats p {
    font-size: 12px;
    color: var(--text-soft);
    line-height: 1.4;
  }
  .week-strip {
    display: flex;
    gap: 6px;
    justify-content: space-between;
    padding-top: 18px;
    border-top: 1px solid var(--border-soft);
  }
  .week-day {
    flex: 1;
    text-align: center;
  }
  .week-day .dot {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid var(--border-soft);
    margin: 0 auto 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 700;
    transition: all 0.2s;
  }
  .week-day .dot.partial {
    background: rgba(74, 222, 128, 0.15);
    border-color: rgba(74, 222, 128, 0.4);
    color: var(--accent);
  }
  .week-day .dot.done {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-color: var(--accent);
    color: var(--bg);
    box-shadow: 0 4px 12px rgba(74, 222, 128, 0.25);
  }
  .week-day .dot.today {
    box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.4);
  }
  .week-day .day-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* === Habit Checklist === */
  .habit-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .habit-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 4px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .habit-row:last-child { border-bottom: none; }
  .habit-row:active { background: rgba(74, 222, 128, 0.04); }
  .habit-checkbox {
    width: 26px;
    height: 26px;
    border-radius: 9px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    background: rgba(0,0,0,0.2);
  }
  .habit-checkbox svg {
    width: 16px;
    height: 16px;
    stroke: var(--bg);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .habit-row.checked .habit-checkbox {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
  }
  .habit-row.checked .habit-checkbox svg { opacity: 1; transform: scale(1); }
  .habit-info { flex: 1; min-width: 0; }
  .habit-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    transition: color 0.2s;
  }
  .habit-row.checked .habit-title {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: rgba(168, 213, 185, 0.4);
  }
  .habit-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .habit-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: rgba(74, 222, 128, 0.08);
    color: var(--accent);
    font-size: 18px;
  }

  /* === Buttons === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 15px 24px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: var(--bg);
    font-weight: 700;
    font-size: 15px;
    border-radius: 14px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.25);
    letter-spacing: -0.1px;
  }
  .btn:active { transform: scale(0.97); }
  .btn.full { width: 100%; }
  .btn.ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-soft);
    box-shadow: none;
  }
  .btn.danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.2);
  }
  .btn.small { padding: 11px 16px; font-size: 13px; border-radius: 11px; }

  /* === Tip card === */
  .tip-card {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(74, 222, 128, 0.02));
    border: 1px solid rgba(74, 222, 128, 0.2);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    position: relative;
  }
  .tip-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 18px;
    bottom: 18px;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    border-radius: 0 3px 3px 0;
  }
  .tip-eyebrow {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
  }
  .tip-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    font-weight: 500;
  }

  /* === Chat (Cora) === */
  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px);
    height: calc(100dvh - 200px);
  }
  .cora-header {
    padding: 24px 22px 18px;
    padding-top: calc(24px + env(safe-area-inset-top));
    background: linear-gradient(180deg, #08311e 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .cora-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, var(--accent-bright), var(--accent-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(74, 222, 128, 0.3);
    position: relative;
  }
  .cora-avatar::after {
    content: "";
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: var(--accent-bright);
    border: 2.5px solid var(--bg);
    border-radius: 50%;
  }
  .cora-info { flex: 1; }
  .cora-name {
    font-family: "Fraunces", serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.3px;
  }
  .cora-status {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 3px;
    font-weight: 500;
  }
  .cora-status .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--accent);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 100px;
  }
  .chat-bubble {
    max-width: 82%;
    padding: 13px 17px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    border-bottom-right-radius: 6px;
    font-weight: 500;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.2);
  }
  .chat-bubble.ai {
    align-self: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .chat-bubble.thinking {
    color: var(--text-muted);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-bubble.thinking::before {
    content: "";
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(74, 222, 128, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .chat-input-bar {
    position: fixed;
    bottom: calc(76px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(6, 40, 24, 0.96);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    padding: 14px 18px;
    border-top: 1px solid var(--border-soft);
    display: flex;
    gap: 10px;
    z-index: 15;
  }
  .chat-input-bar input {
    flex: 1;
    background: var(--bg-card);
    border: 1.5px solid var(--border-soft);
    border-radius: 24px;
    padding: 13px 20px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input-bar input:focus { border-color: var(--accent); }
  .chat-send {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: var(--bg);
    font-size: 20px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.3);
  }
  .chat-empty {
    text-align: center;
    padding: 24px 14px;
  }
  .cora-intro {
    margin: 10px auto 24px;
    max-width: 320px;
  }
  .cora-intro h3 {
    font-family: "Fraunces", serif;
    color: var(--text);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.4px;
  }
  .cora-intro p {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.5;
  }
  .quick-questions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
  }
  .quick-q {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
  }
  .quick-q::after {
    content: "→";
    margin-left: auto;
    color: var(--accent);
    font-weight: 700;
    transition: transform 0.2s;
  }
  .quick-q:hover, .quick-q:active {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateX(2px);
  }
  .quick-q:hover::after { transform: translateX(4px); }

  /* === Subscriptions === */
  .sub-card {
    background: linear-gradient(180deg, var(--bg-card), #0a2e1d);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 14px;
  }
  .sub-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }
  .sub-title {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .sub-meta {
    font-size: 13px;
    color: var(--text-muted);
  }
  .sub-status {
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .sub-status.active {
    background: rgba(74, 222, 128, 0.12);
    color: var(--accent);
    border: 1px solid rgba(74, 222, 128, 0.3);
  }
  .sub-status.paused {
    background: rgba(251, 191, 36, 0.12);
    color: var(--warning);
    border: 1px solid rgba(251, 191, 36, 0.3);
  }
  .sub-status.cancelled {
    background: rgba(239, 68, 68, 0.12);
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .sub-detail {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    font-size: 14px;
    border-top: 1px solid var(--border-soft);
  }
  .sub-detail .key { color: var(--text-muted); font-weight: 500; }
  .sub-detail .val { color: var(--text); font-weight: 600; }
  .sub-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  /* === Profile === */
  .profile-card {
    text-align: center;
    padding: 32px 22px;
  }
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, var(--accent-bright), var(--accent-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--bg);
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
  }
  .profile-email {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .profile-since {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 22px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .profile-stats {
    display: flex;
    gap: 12px;

  }
  .profile-stat .num {
    font-family: "Fraunces", serif;
    font-size: 28px;
    font-weight: 700;

    line-height: 1;
  }
  .profile-stat .label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
  }
  .profile-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);

  .profile-row .label {

  .profile-row .arrow { color: var(--text-muted); font-size: 18px; font-weight: 300; }

  /* === Welcome === */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 28px;
    text-align: center;
    background:
      radial-gradient(ellipse at top, rgba(74, 222, 128, 0.08), transparent 60%),

  }
  .welcome-eyebrow {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .welcome h1 {
    font-family: "Fraunces", serif;
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: -1px;
    line-height: 1.05;
  }
  .welcome h1 .accent { color: var(--accent); font-style: italic; }
  .welcome p {
    font-size: 15px;
    color: var(--text-soft);
    margin-bottom: 36px;
    line-height: 1.6;
    max-width: 340px;
  }
  .welcome-input {
    width: 100%;
    max-width: 340px;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    font-weight: 500;
    transition: border-color 0.2s;
  }
  .welcome-input:focus { border-color: var(--accent); }
  .welcome-disclaimer {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 28px;
    max-width: 300px;
    line-height: 1.6;
  }

  /* === Empty state === */
  .empty-state {
    text-align: center;
    padding: 60px 24px;

  }
  .empty-state .icon {
    font-size: 44px;
    margin-bottom: 16px;
    opacity: 0.6;
  }
  .empty-state h3 {
    font-family: "Fraunces", serif;
    color: var(--text);

    margin-bottom: 8px;

  .empty-state p {

    line-height: 1.6;

  }

  /* === Banners === */
  .error-banner, .success-banner {
    padding: 13px 17px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .error-banner {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--danger);
  }
  .success-banner {
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.3);

  }

  /* === Spinner === */
  .spinner {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 2.5px solid rgba(74, 222, 128, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }
  .loading-state .spinner { margin-bottom: 16px; }

  @keyframes celebrate {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .celebrate { animation: celebrate 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// =====================================================
// HealthyBlood PWA — main app
// =====================================================
const API = window.location.hostname === "localhost"
  ? "http://localhost:3001/api"
  : "https://veo3-command-center.onrender.com/api";

// === Daily habits library ===
const HABITS = [
  { id: "drops",   icon: "💧", title: "Take HealthyBlood drops",  desc: "1 full dropper, with food" },
  { id: "walk",    icon: "🚶", title: "Move for 20 minutes",       desc: "A walk after a meal works wonders" },
  { id: "water",   icon: "🥤", title: "Drink 8 glasses of water",  desc: "Hydration supports heart health" },
  { id: "veggies", icon: "🥗", title: "Eat 1 leafy-green meal",    desc: "Greens fuel cardiovascular wellness" },
  { id: "sleep",   icon: "😴", title: "Sleep 7+ hours tonight",    desc: "Rest is when your body repairs" },
  { id: "noproc",  icon: "🚫", title: "Skip processed & fried",    desc: "Real food, real results" },
];

// === State ===
const state = {
  email: localStorage.getItem("hb_email") || "",
  tab: "home",
  // Habits stored as { "2026-04-09": { drops: true, walk: true, ... } }
  habits: JSON.parse(localStorage.getItem("hb_habits_v2") || "{}"),
  chat: JSON.parse(localStorage.getItem("hb_chat") || "[]"),
  chatBusy: false,
  subs: null,
  subsLoading: false,
  subsError: null,
  actionBusy: null,
  banner: null,
};

// === Storage helpers ===
const saveHabits = () => localStorage.setItem("hb_habits_v2", JSON.stringify(state.habits));
const saveChat = () => localStorage.setItem("hb_chat", JSON.stringify(state.chat));
const saveEmail = (e) => { state.email = e; localStorage.setItem("hb_email", e); };

// === Date helpers ===
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const dayKey = (offset) => {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const habitsForDay = (key) => state.habits[key] || {};
const dayCompleted = (key) => {
  const h = habitsForDay(key);
  return HABITS.every(habit => h[habit.id]);
};
const dayHasAny = (key) => {
  const h = habitsForDay(key);
  return HABITS.some(habit => h[habit.id]);
};
const dayPercent = (key) => {
  const h = habitsForDay(key);
  const done = HABITS.filter(habit => h[habit.id]).length;
  return Math.round((done / HABITS.length) * 100);
};
const calcStreak = () => {
  let s = 0;
  for (let i = 0; i < 365; i++) {
    if (dayCompleted(dayKey(-i))) s++;
    else if (i > 0) break;
  }
  return s;
};
const calcTotalDays = () => Object.keys(state.habits).filter(k => dayCompleted(k)).length;

// === Daily tips ===
const TIPS = [
  "Take HealthyBlood at the same time each day for the smoothest absorption.",
  "Pair your daily dropper with a glass of water and a 20-minute walk.",
  "Consistency matters more than perfection — small daily wins compound.",
  "Try mixing your drops with a splash of orange juice if you prefer the taste.",
  "Hydration helps your body process supplements more efficiently.",
  "A whole-food diet amplifies the benefits of your daily routine.",
  "Most customers feel steadier energy after 4-8 weeks of daily use.",
  "Stress management is just as important as supplementation. Breathe deep.",
  "Quality sleep (7-9 hours) supports your cardiovascular health.",
  "Walking after meals can support healthy cholesterol levels.",
  "Take your dropper with food for the smoothest experience.",
  "Track how you FEEL, not just numbers. Energy and mood matter.",
];
const dailyTip = () => {
  const d = new Date();
  const day = Math.floor(d.getTime() / 86400000);
  return TIPS[day % TIPS.length];
};

// === API helpers ===
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || `Error ${r.status}`);
  return data;
}
async function apiGet(path) {
  const r = await fetch(API + path);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || `Error ${r.status}`);
  return data;
}

// === Welcome ===
function viewWelcome() {
  return `
    <div class="welcome">
      <div class="welcome-eyebrow">HealthyBlood™</div>
      <h1>Welcome to your <span class="accent">wellness</span> companion.</h1>
      <p>Build healthy habits, manage your subscription, and chat with Cora — your personal wellness coach.</p>
      <input class="welcome-input" id="welcomeEmail" type="email" placeholder="your@email.com" autocomplete="email">
      <button class="btn full" id="welcomeBtn" style="max-width:340px">Continue</button>
      <p class="welcome-disclaimer">
        We use your email to find your active subscriptions and personalize your experience. We never share it.
      </p>
    </div>
  `;
}

// === Home / Habit tracker ===
function viewHome() {
  const today = todayKey();
  const todayHabits = habitsForDay(today);
  const completedToday = HABITS.filter(h => todayHabits[h.id]).length;
  const totalHabits = HABITS.length;
  const percent = Math.round((completedToday / totalHabits) * 100);
  const streak = calcStreak();
  const totalDays = calcTotalDays();
  const firstName = state.email ? state.email.split("@")[0].split(/[._]/)[0] : "friend";
  const greeting = getGreeting();

  // 7-day strip
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const k = dayKey(-i);
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push({
      key: k,
      label: d.toLocaleDateString("en-US", { weekday: "short" }).slice(0, 1),
      done: dayCompleted(k),
      partial: !dayCompleted(k) && dayHasAny(k),
      today: i === 0,
    });
  }

  // Progress ring math
  const radius = 36;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (percent / 100) * circumference;

  const headline = percent === 100
    ? "Today is complete! 🎉"
    : percent >= 50
      ? "You're crushing it today."
      : completedToday > 0
        ? "Great start. Keep going."
        : "Let's start your day strong.";

  return `
    <div class="header">
      <div class="wordmark">Healthy<span class="accent">Blood</span></div>
      <div class="header-greeting">${greeting}, ${esc(capitalize(firstName))}</div>
      <div class="header-subtitle">Today · ${formatDate(today)}</div>
    </div>

    <div class="section">
      <div class="hero-card">
        <div class="hero-progress-row">
          <div class="progress-ring">
            <svg width="86" height="86">
              <circle class="ring-bg" cx="43" cy="43" r="${radius}" fill="none" stroke-width="6"/>
              <circle class="ring-fill" cx="43" cy="43" r="${radius}" fill="none" stroke-width="6"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
            </svg>
            <div class="ring-text">
              ${completedToday}/${totalHabits}
              <small>Done</small>
            </div>
          </div>
          <div class="hero-stats">
            <div class="label">Today's Progress</div>
            <h2>${headline}</h2>
            <p>${streak > 0 ? `🔥 ${streak}-day streak · ` : ""}${totalDays} total days complete</p>
          </div>
        </div>

        <div class="week-strip">
          ${days.map(d => `
            <div class="week-day">
              <div class="dot ${d.done ? "done" : ""} ${d.partial ? "partial" : ""} ${d.today ? "today" : ""}">${d.done ? "✓" : d.partial ? "·" : ""}</div>
              <div class="day-label">${d.label}</div>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="card">
        <div class="card-eyebrow">Daily Habits</div>
        <div class="card-title">Build your routine</div>
        <div class="card-sub" style="margin-bottom:12px">Tap each habit when you complete it. Small wins, big results.</div>

        <div class="habit-list">
          ${HABITS.map(h => {
            const checked = todayHabits[h.id];
            return `
              <div class="habit-row ${checked ? "checked" : ""}" data-habit="${h.id}">
                <div class="habit-icon">${h.icon}</div>
                <div class="habit-info">
                  <div class="habit-title">${esc(h.title)}</div>
                  <div class="habit-desc">${esc(h.desc)}</div>
                </div>
                <div class="habit-checkbox">
                  <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </div>

      <div class="tip-card">
        <div class="tip-eyebrow">💡 Tip of the day</div>
        <div class="tip-text">${esc(dailyTip())}</div>
      </div>
    </div>
  `;
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  return "Good evening";
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }

// === Cora Chat ===
function viewChat() {
  const empty = state.chat.length === 0;
  return `
    <div class="cora-header">
      <div class="cora-avatar">C</div>
      <div class="cora-info">
        <div class="cora-name">Cora</div>
        <div class="cora-status"><span class="dot"></span>Your wellness coach · always here</div>
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      ${empty ? `
        <div class="chat-empty">
          <div class="cora-intro">
            <h3>Hi, I'm Cora 🌿</h3>
            <p>Ask me anything about HealthyBlood, daily wellness habits, or how to get the best results from your routine.</p>
          </div>
          <div class="quick-questions">
            <button class="quick-q" data-q="How should I take my HealthyBlood drops for the best results?">How do I take my drops?</button>
            <button class="quick-q" data-q="What's the best time of day to take HealthyBlood?">Best time of day to take it?</button>
            <button class="quick-q" data-q="How long until I notice results from HealthyBlood?">When will I notice results?</button>
            <button class="quick-q" data-q="What habits should I pair with HealthyBlood for the best heart health results?">Best habits to pair with it?</button>
          </div>
        </div>
      ` : state.chat.map(m => `
        <div class="chat-bubble ${m.role === "user" ? "user" : "ai"}">${escMulti(m.content)}</div>
      `).join("") + (state.chatBusy ? `<div class="chat-bubble ai thinking">Cora is thinking…</div>` : "")}
    </div>
    <div class="chat-input-bar">
      <input id="chatInput" type="text" placeholder="Ask Cora anything…" autocomplete="off">
      <button class="chat-send" id="chatSend">→</button>
    </div>
  `;
}

async function sendChat(text) {
  if (!text.trim() || state.chatBusy) return;
  state.chat.push({ role: "user", content: text.trim() });
  state.chatBusy = true;
  saveChat(); render();

  setTimeout(() => {
    const area = document.getElementById("chatArea");
    if (area) area.scrollTop = area.scrollHeight;
  }, 50);

  try {
    const data = await apiPost("/hb/chat", { messages: state.chat });
    const reply = data.choices?.[0]?.message?.content || "Sorry, I didn't catch that. Could you try again?";
    state.chat.push({ role: "assistant", content: reply });
  } catch (e) {
    state.chat.push({ role: "assistant", content: "Sorry, I'm having trouble connecting right now. Please try again in a moment." });
  }
  state.chatBusy = false;
  saveChat(); render();
  setTimeout(() => {
    const area = document.getElementById("chatArea");
    if (area) area.scrollTop = area.scrollHeight;
  }, 50);
}

// === Subscriptions ===
function viewSubs() {
  return `
    <div class="header">
      <div class="wordmark">My <span class="accent">Subscription</span></div>
      <div class="header-greeting">Manage your HealthyBlood deliveries</div>
    </div>
    <div class="section">
      ${state.banner ? `<div class="${state.banner.type}-banner">${esc(state.banner.msg)}</div>` : ""}
      ${renderSubsContent()}
    </div>
  `;
}
function renderSubsContent() {
  if (state.subsLoading) {
    return `<div class="loading-state"><div class="spinner"></div><div>Loading your subscriptions…</div></div>`;
  }
  if (state.subsError) {
    return `<div class="error-banner">${esc(state.subsError)}</div>
      <button class="btn full ghost" onclick="loadSubs()">Try Again</button>`;
  }
  if (!state.subs || state.subs.length === 0) {
    return `
      <div class="empty-state">
        <div class="icon">📦</div>
        <h3>No active subscriptions</h3>
        <p>We couldn't find any subscriptions tied to <strong>${esc(state.email)}</strong>.</p>
        <a class="btn" href="https://www.tryhealthyblood.com" target="_blank">Browse HealthyBlood</a>
      </div>
    `;
  }
  return state.subs.map(sub => renderSubCard(sub)).join("");
}
function renderSubCard(sub) {
  const status = (sub.status || "active").toLowerCase();
  const isPaused = status === "paused";
  const isCancelled = status === "cancelled" || status === "canceled";
  const busy = state.actionBusy === sub.id;
  const productName = sub.product_title || sub.line_items?.[0]?.title || "HealthyBlood Cholesterol Cleanse";
  const interval = sub.billing_interval || sub.interval || "month";
  const intervalCount = sub.billing_interval_count || sub.interval_count || 1;
  const nextCharge = sub.next_billing_date || sub.next_charge_scheduled_at || null;
  const price = sub.price ? `$${parseFloat(sub.price).toFixed(2)}` : "—";

  return `
    <div class="sub-card">
      <div class="sub-header">
        <div>
          <div class="sub-title">${esc(productName)}</div>
          <div class="sub-meta">Every ${intervalCount} ${interval}${intervalCount > 1 ? "s" : ""}</div>
        </div>
        <div class="sub-status ${status}">${status}</div>
      </div>
      <div class="sub-detail">
        <span class="key">Next delivery</span>
        <span class="val">${nextCharge ? formatDate(nextCharge) : "—"}</span>
      </div>
      <div class="sub-detail">
        <span class="key">Price</span>
        <span class="val">${price}</span>
      </div>
      ${!isCancelled ? `
        <div class="sub-actions">
          ${busy ? `
            <div style="grid-column:1/-1;text-align:center;padding:14px"><span class="spinner"></span></div>
          ` : isPaused ? `
            <button class="btn small" onclick="subAction('${sub.id}','resume')">▶ Resume</button>
            <button class="btn small danger" onclick="subAction('${sub.id}','cancel')">Cancel</button>
          ` : `
            <button class="btn small ghost" onclick="subAction('${sub.id}','skip')">Skip Next</button>
            <button class="btn small ghost" onclick="subAction('${sub.id}','pause')">Pause</button>
          `}
        </div>
      ` : ""}
    </div>
  `;
}
function formatDate(d) {
  try {
    return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  } catch { return d; }
}
async function loadSubs() {
  state.subsLoading = true; state.subsError = null; render();
  try {
    const data = await apiGet(`/hb/subscriptions?email=${encodeURIComponent(state.email)}`);
    state.subs = Array.isArray(data) ? data : (data.subscriptions || data.data || []);
  } catch (e) {
    state.subsError = e.message;
    state.subs = null;
  }
  state.subsLoading = false; render();
}
async function subAction(id, action) {
  state.actionBusy = id; state.banner = null; render();
  try {
    await apiPost(`/hb/subscription/${id}/${action}`, {});
    state.banner = { type: "success", msg: `Subscription ${action}d successfully.` };
    await loadSubs();
  } catch (e) {
    state.banner = { type: "error", msg: e.message };
  }
  state.actionBusy = null; render();
  setTimeout(() => { state.banner = null; render(); }, 4000);
}
window.loadSubs = loadSubs;
window.subAction = subAction;

// === Profile ===
function viewProfile() {
  const initial = state.email ? state.email[0].toUpperCase() : "?";
  const sinceDate = localStorage.getItem("hb_member_since") || todayKey();
  if (!localStorage.getItem("hb_member_since")) localStorage.setItem("hb_member_since", sinceDate);

  return `
    <div class="header">
      <div class="wordmark"><span class="accent">Your</span> Profile</div>
      <div class="header-greeting">Account & preferences</div>
    </div>
    <div class="section">
      <div class="card profile-card">
        <div class="avatar">${initial}</div>
        <div class="profile-email">${esc(state.email)}</div>
        <div class="profile-since">Member since ${formatDate(sinceDate)}</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="num">${calcStreak()}</div>
            <div class="label">Day Streak</div>
          </div>
          <div class="profile-stat">
            <div class="num">${calcTotalDays()}</div>
            <div class="label">Days Complete</div>
          </div>
        </div>
      </div>

      <div class="profile-row" onclick="window.open('https://www.tryhealthyblood.com','_blank')">
        <div class="label"><span class="label-icon">🛒</span>Shop HealthyBlood</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="window.open('mailto:support@tryhealthyblood.com')">
        <div class="label"><span class="label-icon">✉️</span>Contact Support</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="clearChat()">
        <div class="label"><span class="label-icon">💬</span>Clear chat with Cora</div>
        <div class="arrow">›</div>
      </div>
      <div class="profile-row" onclick="logout()" style="margin-top:24px;border-color:rgba(239,68,68,0.25)">
        <div class="label" style="color:var(--danger)"><span class="label-icon" style="background:rgba(239,68,68,0.1);color:var(--danger)">⏻</span>Sign out</div>
        <div class="arrow">›</div>
      </div>

      <p style="text-align:center;color:var(--text-muted);font-size:11px;margin-top:30px;line-height:1.6;padding:0 20px">
        HealthyBlood™ statements have not been evaluated by the FDA.<br>
        This product is not intended to diagnose, treat, cure, or prevent any disease.<br>
        Always consult your physician.
      </p>
    </div>
  `;
}
function logout() {
  if (confirm("Sign out and clear all your data on this device?")) {
    localStorage.removeItem("hb_email");
    localStorage.removeItem("hb_chat");
    localStorage.removeItem("hb_member_since");
    state.email = "";
    state.chat = [];
    state.subs = null;
    state.tab = "home";
    render();
  }
}
function clearChat() {
  if (confirm("Clear your chat history with Cora?")) {
    state.chat = [];
    saveChat();
    render();
  }
}
window.logout = logout;
window.clearChat = clearChat;

// === Bottom Nav (icon-based, no HB logo) ===
function viewNav() {
  const tabs = [
    { id: "home",    label: "Today",   icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12L12 3l9 9M5 10v10h14V10" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "chat",    label: "Cora",    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 21l1.9-5.4A8 8 0 1 1 21 12Z" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "subs",    label: "Plan",    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 8V21H3V8M1 3h22v5H1zM10 12h4" stroke-linecap="round" stroke-linejoin="round"/></svg>` },
    { id: "profile", label: "You",     icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0" stroke-linecap="round"/></svg>` },
  ];
  return `
    <div class="nav">
      ${tabs.map(t => `
        <button class="${state.tab === t.id ? "active" : ""}" data-tab="${t.id}">
          <div class="nav-icon">${t.icon}</div>
          <div>${t.label}</div>
        </button>
      `).join("")}
    </div>
  `;
}

// === Render ===
function render() {
  const root = document.getElementById("app");

  if (!state.email) {
    root.innerHTML = viewWelcome();
    bindWelcome();
    return;
  }

  let mainContent = "";
  if (state.tab === "home") mainContent = viewHome();
  else if (state.tab === "chat") mainContent = viewChat();
  else if (state.tab === "subs") mainContent = viewSubs();
  else if (state.tab === "profile") mainContent = viewProfile();

  root.innerHTML = `<div class="main">${mainContent}</div>${viewNav()}`;
  bindEvents();
}

function bindWelcome() {
  const input = document.getElementById("welcomeEmail");
  const btn = document.getElementById("welcomeBtn");
  const submit = () => {
    const v = input.value.trim();
    if (!v || !v.includes("@")) {
      input.style.borderColor = "var(--danger)";
      input.focus();
      return;
    }
    saveEmail(v);
    state.tab = "home";
    render();
  };
  btn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  setTimeout(() => input.focus(), 100);
}

function bindEvents() {
  // Bottom nav
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.addEventListener("click", () => {
      const tab = btn.getAttribute("data-tab");
      state.tab = tab;
      render();
      if (tab === "subs" && !state.subs && !state.subsLoading) loadSubs();
    });
  });

  // Habit checkboxes
  document.querySelectorAll(".habit-row").forEach(row => {
    row.addEventListener("click", () => {
      const id = row.getAttribute("data-habit");
      const today = todayKey();
      if (!state.habits[today]) state.habits[today] = {};
      state.habits[today][id] = !state.habits[today][id];
      saveHabits();
      render();
    });
  });

  // Chat input
  const chatInput = document.getElementById("chatInput");
  const chatSend = document.getElementById("chatSend");
  if (chatInput && chatSend) {
    const send = () => {
      const v = chatInput.value;
      chatInput.value = "";
      sendChat(v);
    };
    chatSend.addEventListener("click", send);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  }

  // Quick questions
  document.querySelectorAll(".quick-q").forEach(b => {
    b.addEventListener("click", () => {
      const q = b.getAttribute("data-q");
      sendChat(q);
    });
  });

  // Auto-load subs when entering tab
  if (state.tab === "subs" && !state.subs && !state.subsLoading && !state.subsError) {
    loadSubs();
  }
}

// === Utilities ===
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escMulti(s) {
  return esc(s).replace(/\n/g, "<br>");
}

// === Boot ===
render();
</script>
</body>
</html>
